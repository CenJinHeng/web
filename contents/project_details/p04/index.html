  <template id="detail-content-zh-template"><div><span style="color: rgb(111, 106, 100); background-color: transparent;">项目概要：</span><span style="color: rgb(111, 106, 100); background-color: transparent;"></span><span style="color: rgb(111, 106, 100); background-color: transparent;">政府规划部门希望收集居民对费城市中心游览游径的建议，辅助街道更新规划的决策。项目起初面临两大挑战：（1）问题抽象；（2）收集信息多，答卷过长引起受访者反感。对此，我们设计了情景化和游戏化的画板—
—通过情景模拟游戏切入问题的具体场景：“如果要带朋友来参观自己的社区一天，你会怎么规划行程呢？”，从而引导（prompt）用户在具体场景下表露看法和发表意见。我们还在结尾设置感谢卡和分享的激励环节。</span></div><p class="detail-note-text"><span></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 411px;" data-ratio="0.5715" data-resizing="0"><img src="assets/1772850842395.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><span><div style="text-align: center;"><a class="detail-inline-link detail-inline-button" role="button" href="#jump-anchor-mmbmtd9h-nuegpb" data-button-link-type="anchor" data-button-target="9" data-button-has-border="1" data-button-bold="1" data-button-radius="12" data-button-border-color="#1d1c1a" data-button-fill-color="#ffffff" data-button-text-color="#1d1c1a" style="display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; text-decoration: none; vertical-align: middle; cursor: pointer; color: rgb(29, 28, 26); background: rgb(255, 255, 255); border-radius: 12px; border: 1px solid rgb(29, 28, 26); padding: 8px 16px;">立即体验Demo</a><br></div></span><p></p><h1>背景与挑战</h1><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(0, 0, 0);">费城是美国的前首都，也是《独立宣言》的诞生地，每年吸引成千上万的游客。<b>除了博物馆，宪法公园等官方的景点外，周边街区的小街小巷同样值得游客探索，这些日常的故事与文化能丰富游览体验。</b></span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(0, 0, 0);">但这些信息只有本地居民才知道，或者有资格去评说。因此，规划部门希望向居民了解——有什么地方是能代表这个社区的？什么地方有故事和历史值得向游客分享？什么地方能代表这个社区的特色？基于居民提供的信息，规划部门将<b>据此进行游览路径的规划，以及相应街道设施的提升</b>。</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(0, 0, 0);">我们希望通过一个在线的工具，让居民在画板中标记出这些地点，并写出自己的想法。</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(0, 0, 0);">项目遇到的<b>挑战</b>集中在两个方面：</span></p><p style="caret-color: rgb(0, 0, 0);"></p><ol><li><span style="color: rgb(0, 0, 0);"><b>我们想收集的信息很抽象：</b>“你觉得社区的哪个地方对你最有意义？”；“你觉得哪个地方最能代表这个社区？”......</span></li><li><span style="color: rgb(0, 0, 0);"><b>收集信息多，问卷冗长引起受访者反感。</b>因为想知道居民每一个推荐的地点，为什么被选中？推荐游客在那做什么？哪里需要被提升......</span></li></ol><p></p><h1>产品设计</h1><p class=""><span style="color: rgb(0, 0, 0);">我们的产品在充分理解规划部门想获得什么信息的需求上，<b>将抽象的信息需求翻译成具体的，通俗的表达，从而确定了要收集的内容</b>。</span></p><p class=""><span style="color: rgb(0, 0, 0);">我们还<b>通过情景模拟的方式切入问题的具体场景</b>。让居民模拟的情景是：“如果要带朋友来参观自己的社区一天，你会怎么规划行程呢？”，从而引导用户在具体场景下发表看法，意见。</span></p><p class=""><span style="color: rgb(0, 0, 0);"><br></span></p><p class=""><span style="color: rgb(0, 0, 0);">该项目是黑客松（Hackathon）模式，我们在2天内完成了产品的设计和开发，因此是<b>MVP版本</b>，有提升和迭代空间。如产品设计上，针对不同用户和场景进行优化；交互体验上，增加新手教程和优化操作体验。</span></p><blockquote><span>黑客松是一种短期的创作营，团队在限定的极短时间内，针对某个真实的主题从0到1设计产品方案并完成开发</span></blockquote><p>下文将简要展示该社区参与画板：</p><p class="detail-note-text"><span>注意：图片均使用了翻译，翻译结果可能不准确。（下同）</span></p><p class=""></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 408px;" data-ratio="0.5661" data-resizing="0"><img src="assets/1772850842408.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;"><span>欢迎浮窗：向用户介绍项目的意义；用户可以选择进入哪一个界面</span></p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 386px;" data-ratio="0.5356" data-resizing="0"><img src="assets/1772850842418.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">用户点击右方按钮开始设计自己推荐的游径</p><p style="text-align: center;" class="detail-note-text">第一步选择推荐的景点，每个景点都需要填写名称，推荐的理由和选择推荐的活动</p><p style="text-align: center;" class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 387px;" data-ratio="0.5370" data-resizing="0"><img src="assets/1772850842427.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">完成景点推荐后，内容会在右侧显示</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 383px;" data-ratio="0.5326" data-resizing="0"><img src="assets/1772850842435.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text"><span>用户需要绘制推荐的游览路径，连接推荐的两个景点</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 386px;" data-ratio="0.5360" data-resizing="0"><img src="assets/1772850842442.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text"><span>用户可以对景点和路径选择设计提升的建议</span></p><p style="text-align: center;" class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 386px;" data-ratio="0.5356" data-resizing="0"><img src="assets/1772850842448.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text"><span>编辑完成后点击提交，用户会收到一封感谢信，可以输入自己的名字并下载留念</span></p><p class="detail-note-text"><span></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 386px;" data-ratio="0.5359" data-resizing="0"><img src="assets/1772850842454.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="color: rgb(111, 106, 100); text-align: center;"><span>提交后，默认返回游径地图：用户可以浏览其他人推荐的游径</span></p><p class="detail-note-text" style="text-align: center;"><span></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 386px;" data-ratio="0.5359" data-resizing="0"><img src="assets/1772850842463.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="color: rgb(111, 106, 100); text-align: center;">点击某一条游径可以看到推荐景点、路径、推荐的理由、推荐活动</p><p><br></p><h1><span>Demo展示</span></h1><p>预览窗口可能显示不完全，建议跳转到展示网页体验</p><p>不支持移动端</p><p class="detail-note-text" id="jump-anchor-mmbmtd9h-nuegpb" data-line-jump-anchor-id="jump-anchor-mmbmtd9h-nuegpb"><span></span></p><div class="image-wrapper web-preview-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" data-ratio="0.6250" data-web-preview-src="https://cenjinheng.github.io/engagement-project/" data-web-preview-type="external" style="width: 960px; height: 600px; overflow: hidden;" data-resizing="0"><div class="web-preview-placeholder"><p class="web-preview-placeholder-note">请点击下方的预览按钮查看插入效果</p></div></div><div style="text-align: center;"><a class="detail-inline-link detail-inline-button" role="button" href="https://cenjinheng.github.io/engagement-project/" data-button-link-type="external" data-button-target="https://cenjinheng.github.io/engagement-project/" data-button-has-border="1" data-button-bold="1" data-button-radius="12" data-button-border-color="#1d1c1a" data-button-fill-color="#ffffff" data-button-text-color="#1d1c1a" target="_blank" rel="noopener noreferrer" style="display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; text-decoration: none; vertical-align: middle; cursor: pointer; color: rgb(29, 28, 26); background: rgb(255, 255, 255); border-radius: 12px; border: 1px solid rgb(29, 28, 26); padding: 8px 16px;">跳转到展示网页</a><br></div><div style="text-align: center;"><br></div><p></p><p class="detail-note-text"></p></template>
  <template id="detail-content-en-template"><div><p class="detail-note-text"><font>Project Overview: The city planning department sought to gather residents' suggestions for the Philadelphia Downtown Tourist Trail to inform street renewal planning decisions. The project initially faced two major challenges: (1) Abstract questions. Examples included “Which area do you feel has the strongest sense of place?” and “Which areas do you think most need improvement?” (2) Lengthy questionnaires deterred respondents due to excessive information collection. To address this, we designed a contextualized, gamified canvas. We framed questions within specific scenarios through a simulation game: “If you were to show a friend around your neighborhood for a day, how would you plan the itinerary?” This approach prompted users to express opinions within concrete contexts. We also incorporated thank-you cards and sharing incentives at the conclusion.</font></p></div><p class="detail-note-text"><span></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 411px;" data-ratio="0.5715" data-resizing="0"><img src="assets/1772850842395.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><span><div style="text-align: center;"><a class="detail-inline-link detail-inline-button" role="button" href="#jump-anchor-mmlg63x0-je12nr" data-button-link-type="anchor" data-button-target="9" data-button-has-border="1" data-button-bold="1" data-button-radius="12" data-button-border-color="#1d1c1a" data-button-fill-color="#ffffff" data-button-text-color="#1d1c1a" style="display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; text-decoration: none; vertical-align: middle; cursor: pointer; color: rgb(29, 28, 26); background: rgb(255, 255, 255); border-radius: 12px; border: 1px solid rgb(29, 28, 26); padding: 8px 16px;">Go to the Demo</a><br></div></span><p></p><h1>Background&amp;Challenge</h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Philadelphia, the former capital of the United States and birthplace of the Declaration of Independence, attracts thousands of visitors annually. <b>Beyond official attractions like museums and Constitution Center, the neighborhood streets and alleys are equally worth exploring, as these everyday stories and cultures enrich the visitor experience.</b></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">However, this information is known only to local residents or those qualified to share it. Therefore, the planning department seeks input from residents: What places represent this community? Which spots hold stories and history worth sharing with visitors? Where can the community's unique character be found? <b>Based on resident input, the planning department will design tour routes and enhance corresponding street facilities.</b></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">We aim to create an online tool where residents can mark these locations on a digital canvas and share their thoughts.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The challenges encountered in this project centered on two key areas:</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"></p><ol><li><span style="background-color: transparent;"><b>The information we sought to collect was highly abstract:</b> “Which part of the community holds the most meaning for you?”; “Which location best represents this community?”...</span></li><li><b>The sheer volume of data collection and the resulting lengthy questionnaire caused respondent fatigue.</b> We needed to understand why each recommended location was chosen, what activities visitors should engage in there, and which areas required improvement...</li></ol><p></p><p></p><h1>Product Design</h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Our product <b>translates abstract information requirements into concrete, accessible language</b> by thoroughly understanding what planning departments seek to obtain, thereby defining the content to be collected.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">We also approach specific scenarios through <b>scenario simulations.</b> Residents are asked to imagine: “If you were to bring a friend to tour your community for a day, how would you plan the itinerary?” This prompts users to share their perspectives and opinions within a concrete context.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">This project was developed in a hackathon format, where we completed the product design and development within two days. As such, it is an <b>MVP</b> version with room for improvement and iteration. For instance, in product design, we plan to optimize for different users and scenarios; in terms of interaction experience, we will add a beginner tutorial and enhance the operational experience.</p><blockquote><span>A hackathon is a short-term creative camp where teams design product solutions from scratch and complete development within an extremely limited timeframe, addressing a real-world theme.</span></blockquote><h1><span>Demo</span></h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The preview window may not display fully. We recommend visiting the actual webpage for the full experience.</p><p>Mobile version is not supported.</p><p class="detail-note-text" id="jump-anchor-mmbmtd9h-nuegpb" data-line-jump-anchor-id="jump-anchor-mmbmtd9h-nuegpb"><span></span></p><div class="image-wrapper web-preview-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" data-ratio="0.6250" data-web-preview-src="https://cenjinheng.github.io/engagement-project/" data-web-preview-type="external" style="width: 960px; height: 600px; overflow: hidden;" data-resizing="0"><div class="web-preview-placeholder"><p class="web-preview-placeholder-note">请点击下方的预览按钮查看插入效果</p></div></div><div style="text-align: center;"><a class="detail-inline-link detail-inline-button" role="button" href="https://cenjinheng.github.io/engagement-project/" data-button-link-type="external" data-button-target="https://cenjinheng.github.io/engagement-project/" data-button-has-border="1" data-button-bold="1" data-button-radius="12" data-button-border-color="#1d1c1a" data-button-fill-color="#ffffff" data-button-text-color="#1d1c1a" target="_blank" rel="noopener noreferrer" style="display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; text-decoration: none; vertical-align: middle; cursor: pointer; color: rgb(29, 28, 26); background: rgb(255, 255, 255); border-radius: 12px; border: 1px solid rgb(29, 28, 26); padding: 8px 16px;">Redirect to the page</a><br></div><div style="text-align: center;"><br></div><p></p><p class="detail-note-text"></p></template>
