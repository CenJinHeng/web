  <template id="detail-content-zh-template"><div><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">✨&nbsp;</span><span style="background-color: transparent;"><b>中国城市规划年会论文《文化传承视角下老城街巷餐饮空间布局研究-- 以广州为例》（第二作者）；中国城市规划年会墙报奖</b></span></div><p><span style="background-color: transparent;"><b><br></b></span></p><p class="detail-note-text"><font><span><font>项目概要：</font></span><span>广州餐饮文化在全国具有独特地位，尤其老城区的街巷餐饮空间更具地方特色和烟火气，因此
深度解析广州老城街巷餐饮空间对美食文化的传承和发展具有重要意义。</span><span>基于大众点评 POI 数据，获取广州街道餐饮密度、均价、活力、口碑、丰富度与老字号数量的六项指标。基于问卷结果对街道餐饮业态进行加权打分，从而得到广州街道的餐饮综合分数。研究发现广州老城餐饮空间呈现明显聚集性，并沿道路线性分布。基于此，研究从“点-线-面”的层次提出相应</span><span>规划策略：</span><span>老字号和网红店以点带面；打造两条美食游径；餐饮文化区活动策划。</span></font></p><p class="detail-note-text"><span>下载文章：<a class="detail-inline-link detail-download-link" href="assets/1773114216678-file.pdf" download="《文化传承视角下老城街巷餐饮空间布局研究——以广州为例》.pdf">《文化传承视角下老城街巷餐饮空间布局研究——以广州为例》.pdf</a></span></p><p class="detail-note-text"><br></p><h1><font><span>研究背景</span></font></h1><p><font>餐饮业作为城市服务行业的重要组成部分之一，其<span style="color: rgb(0, 0, 0);">商户数量与空间分布能够在一定程
度上反映一个地区的经济文化发展水平</span><span>。</span>广州作为国务院公布的全国第一批历史文化名城之一，拥有 2200 多年深厚的历史积淀，其<b><span style="color: rgb(180, 95, 6);">“食在广州”的餐饮文化在全国具有独特地位。
而</span><span style="color: rgb(180, 95, 6);">广州老城区传统街巷保留较完整的空间格局，承载城市历史文脉和市民集体记忆，是体现广州餐饮文化特色和传统餐饮空间风貌的最佳空间载体</span></b>。结合广州地域餐饮文化特征，
从街巷尺度对广州老城区的餐饮空间布局进行分析与评价，对指导广州城市规划建设与餐
饮空间选址具有重要意义，有助于通过餐饮空间对逐渐衰落的街巷进行活化，在丰富本土餐饮文化内涵的同时激活其生命力，实现老城街巷保护与社会生活的有机结合。<span></span></font></p><p><font>本文在综合前人的理论与方法基础上，<span style="color: rgb(180, 95, 6);"><b>以富含广州特色餐饮文化的老城区作为研究区域，基于其特殊的街巷肌理与空间特点，以街巷为基本研究单位，运用 ArcGIS 平台，结合
“美团”数据对广州老城区饮空间进行深度解析</b>。</span>并基于构建多因子综合评价体系分析广州老城街巷餐饮空间分布总体特征，以期挖掘与弘扬广州老城的餐饮地域文化，为广州老城区独特的餐饮空间规划提供参考，促进广州老城区餐饮文化传承与高质量发展。</font></p><h1><font><span>研究范围</span></font></h1><p><span>本文中广州老城区范围参考《广州历史文化名城保护规划》公示稿中历史城区保护范围，并以该范围内378条传统街巷沿线的实体餐饮店为研究对象,包括小吃店饭店、酒楼等以及餐饮老字号等。街巷作为人们生活与活动的重要空间，可视为城市餐饮空间的出发点与发源地，以街巷为尺度对广州老城区的餐饮空间进行研究具有典型性与代表性。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 217px;" data-ratio="0.3393" data-resizing="0"><img src="assets/1773114216765.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">研究范围</p><h1>研究框架</h1><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 568px;" data-ratio="0.8875" data-resizing="0"><img src="assets/1773114216771.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">研究框架</p><h1>餐饮空间综合评价体系构建</h1><p><span>对沿街餐饮密度、沿街餐饮均价、沿街餐饮活力、沿街餐饮口碑、沿街餐饮丰富度以及沿街老字号密度6项评价指标分为5级进行赋分（如下表格所示），并输出每一项指标的得分结果</span></p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 506px;" data-ratio="0.7912" data-resizing="0"><img src="assets/1773114216777.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">街道数据和餐饮POI数据可视化</p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 605px;" data-ratio="0.9453" data-resizing="0"><img src="assets/1773114216782.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">指标赋分标准</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 745px;" data-ratio="1.1636" data-resizing="0"><img src="assets/1773114216791.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">六项指标分析结果</p><p>通过问卷获取顾客选择餐厅时对各项指标的重视程度</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 233px;" data-ratio="0.3633" data-resizing="0"><img src="assets/1773114216798.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">各项指标的权重结果</p><p>对每条街巷指标分数进行加权求和，从而获得综合评分</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 216px;" data-ratio="0.3375" data-resizing="0"><img src="assets/1773114216807.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">综合评分结果</p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 726px;" data-ratio="1.1342" data-resizing="0"><img src="assets/1773114216815.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">综合评分前十五名的街道</p><p style="text-align: left;"><span><span style="color: rgb(180, 95, 6);"><b>广州老城街巷各高水平聚集餐饮空间的分布呈现出东西向轴线分布的特征。</b></span>其中，西华路与中山六路片区、恩宁路--第十甫路-上下九片区、北京路商业区呈现出较高水平餐饮的聚集，形成一定区域范围的美食圈,东山口片区相较次之。同时,历史价值意义显著的区域（如骑楼环、北京路等），往往呈现出与其历史背景相应的更高的餐饮水平。</span></p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 473px;" data-ratio="0.7385" data-resizing="0"><img src="assets/1773114216823.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">广州老城区餐饮空间分析图</p><p><span>研究还发现：</span></p><p></p><ol><li><span>广州老城街巷餐饮空间存在一定的区域聚集性与区别于中心城区的特征。其中，沿街餐饮密度、活力与丰富度呈现出一定的区域聚集性特征；老城街巷餐饮整体消费较低；沿街餐饮口碑整体较为平均，口碑较高的片区呈现出一定的区域聚集性；</span></li><li>老字号能够体现一个城市的地域文化特征与历史痕迹，而餐饮老字号能够体现一个城市的餐饮文化深度。广州老城街巷沿街老字号分布较广，老城区内各个区域均有所分布，对老城区的街巷餐饮发展具有带动作用。</li><li>广州老城街巷各高水平聚集餐饮区的分布呈现出东西向轴线布局的特征，该结果与广州老城区的总体布局和交通现状存在密切联系，餐饮街巷热点主要集中分布在四个片区：北京路综合文旅区、东山口中西融合区、老西关传统小吃区、西华路老广风味区，且集中区域往往布局于轨道交通站点周边。</li></ol><p></p><h1>规划策略</h1><p>广州老城街巷餐饮空间具有浓郁的餐饮文化特色以及独特的生活气息，但随着城市化的推进，老城区内越来越多的街巷走向衰落，通过对文化的注入与传承以及餐饮空间的针
对性规划，实现街巷活力的恢复与延续，有助于广州老城区餐饮文化传承与高质量发展。建议<span style="color: rgb(180, 95, 6);"><b>通过发挥餐饮老字号优势、构建老城特色游径、策划多元特色餐饮消费，实施点-线-面
三个层面下的广州老城街巷餐饮空间规划策略。</b></span></p><p></p><ol><li>以点带面，充分发挥餐饮老字号优势实施针对性导则设计</li><li>以线带面，通过特色餐饮游径彰显广州美食之都文化特色&nbsp;</li><li>结合街巷餐饮空间分项评价策划多元特色餐饮消费，打造高品质高活力的餐饮文化区&nbsp;</li></ol><p></p><p><br></p><h1>后续研究发现</h1><p>下图是一幅三维的数据可视化图，底图的范围是广州老城区。老字号（下图蓝色线条，越高代表年龄越老）和网红店（下图橙色线条，<span style="background-color: transparent;">越高代表越火</span><span style="background-color: transparent;">）所在的区域是不一样的。老字号集中在居民区，而网红店集中在北京路等热门景点。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 844px;" data-ratio="1.3194" data-resizing="0"><img src="assets/1773116585535.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 814px;" data-ratio="1.2712" data-resizing="0"><img src="assets/1773116585579.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><span style="caret-color: rgb(0, 0, 0); color: rgb(180, 95, 6);"><b style="">该图揭示了</b></span><span style="caret-color: rgb(0, 0, 0);"><b style="color: rgb(180, 95, 6);">城市餐饮空间的演变过程。</b><span style="color: rgb(0, 0, 0);">以前餐厅主要是服务本地居民，分布在居民区附近，特征是年龄老。这些“老字号”经历了多年的竞争，已经获得了当地居民的认可。然而，由于老城区人口外迁，客源减少，这些营业几十年的老字号正在式微。如今，老城区的餐饮消费主要由游客支撑，而游客选择餐厅依赖于互联网的推荐。当前互联网评价数量最高、最火的餐厅主要集中在北京路、德政路等旅游消费中心。他们的平均开业年限都很短，平均寿命也很短，几乎在0-3年内倒闭，反应了当下网红餐饮业“追逐热点，快开快关”的经营策略。整体趋势表明，由于老城区人口外迁和互联网对餐饮空间的重塑，广州老城区的餐饮商业正从</span></span><span style="color: rgb(180, 95, 6);"><strong data-start="158" data-end="188" style="caret-color: rgb(0, 0, 0);">分散、服务本地居民、老字号为主的格局，转向中心化、服务游客和网红快闪店为主的格局</strong><span style="caret-color: rgb(0, 0, 0);">。</span></span></p></template>
  <template id="detail-content-en-template"><div><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">✨&nbsp;</span><span style="background-color: transparent;"><b>Paper at the Annual Conference on Urban Planning in China: “Research on the Spatial Layout of Dining Spaces in Old City Alleys from a Cultural Heritage Perspective: A Case Study of Guangzhou” (Second Author); Poster Award</b></span></div><p><span style="background-color: transparent;"><b><br></b></span></p><p class="detail-note-text">Project Overview: Guangzhou's culinary culture holds a unique position nationwide, with the dining spaces in the old city's alleys and lanes particularly rich in local character and vibrant atmosphere. Therefore, conducting an in-depth analysis of these spaces is crucial for understanding the preservation and evolution of Guangzhou's food culture. Using POI data from Dianping, a rating app like Yelp in China, six indicators were extracted: dining density, average price, vitality, reputation, diversity, and the number of time-honored establishments. We applied weighted scoring to street dining formats based on survey results, yielding comprehensive dining scores for each Guangzhou street. Findings reveal distinct clustering patterns in the city's historic dining spaces, which exhibit linear distribution along roadways. Consequently, this study proposes tiered planning strategies from “point-line-area” perspectives: leveraging time-honored establishments and trending eateries as focal points to drive broader impact; creating two culinary tourism routes; and organizing cultural events within dining districts.</p><p class="detail-note-text"><span>Download：<a class="detail-inline-link detail-download-link" href="assets/1773114216678-file.pdf" download="《文化传承视角下老城街巷餐饮空间布局研究——以广州为例》.pdf">《文化传承视角下老城街巷餐饮空间布局研究——以广州为例》.pdf</a></span></p><p class="detail-note-text"><br></p><h1><font><span>Intro</span></font></h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">As a vital component of the urban service industry, the number and spatial distribution of food and beverage establishments can to a certain extent reflect the economic and cultural development level of a region. As one of China's first batch of nationally designated historical and cultural cities, Guangzhou boasts over 2,200 years of profound historical heritage. Its culinary culture, epitomized by the saying “Guangzhou is where the food is,” holds a unique status nationwide. The traditional alleys and lanes of Guangzhou's old city district retain a relatively intact spatial layout, carrying the city's historical legacy and collective civic memory. They serve as the optimal spatial vehicle for showcasing Guangzhou's distinctive culinary culture and traditional dining environments. Analyzing and evaluating the spatial layout of dining establishments in Guangzhou's old city from an alley-scale perspective, in conjunction with the city's regional culinary characteristics, holds significant implications for guiding urban planning and restaurant site selection. This approach facilitates the revitalization of declining alleys through dining spaces, enriching local culinary culture while rejuvenating their vitality. It achieves an organic integration of old-city alley preservation with contemporary social life.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Building upon existing theoretical frameworks and methodologies, this study focuses on Guangzhou's historic district—rich in distinctive culinary heritage—as its research area. Given its unique alleyway fabric and spatial characteristics, the study adopts alleyways as the fundamental unit of analysis. Utilizing the ArcGIS platform and integrating Meituan data, it conducts an in-depth examination of dining spaces within the historic district. Furthermore, by constructing a multi-factor comprehensive evaluation system, this study analyzes the overall distribution characteristics of dining spaces within Guangzhou's old city alleys. The aim is to uncover and promote the distinctive regional culinary culture of Guangzhou's historic district, providing reference for the unique spatial planning of its dining areas and fostering the inheritance and high-quality development of its culinary heritage.</p><h1><font><span>Research Area</span></font></h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">This study defines the scope of Guangzhou's historic district based on the protected area outlined in the draft “Guangzhou Historic and Cultural City Conservation Plan.” It examines physical dining establishments along 378 traditional streets and alleys within this zone, including snack shops, restaurants, banquet halls, and time-honored culinary brands. As vital spaces for daily life and activities, streets and alleys can be regarded as the starting point and birthplace of urban dining spaces. Studying Guangzhou's old city dining spaces at the scale of these streets and alleys offers both typicality and representativeness.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 217px;" data-ratio="0.3393" data-resizing="0"><img src="assets/1773114216765.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">Research Area</p><h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Evaluation System Development</p></h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The six evaluation metrics—street-side dining density, average price of street-side dining, street-side dining vibrancy, street-side dining reputation, street-side dining diversity, and density of time-honored establishments along the street—are scored across five levels (as shown in the table below), with the score results for each metric outputted.</p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 506px;" data-ratio="0.7912" data-resizing="0"><img src="assets/1773114216777.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Street Data and Restaurant POI Data Visualization</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 745px;" data-ratio="1.1636" data-resizing="0"><img src="assets/1773114216791.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Analysis Results of Six Indicators</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Through questionnaires, we assess the importance customers place on various factors when selecting restaurants.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 233px;" data-ratio="0.3633" data-resizing="0"><img src="assets/1773114216798.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Weighting results for each indicator</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Weighted summation of the indicator scores for each street and alley is performed to obtain a comprehensive score.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 216px;" data-ratio="0.3375" data-resizing="0"><img src="assets/1773114216807.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Comprehensive Score Results</p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 726px;" data-ratio="1.1342" data-resizing="0"><img src="assets/1773114216815.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">The top fifteen subdistricts by overall score</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The distribution of high-level dining spaces within Guangzhou's historic streets and alleys exhibits an east-west axis pattern. Areas such as Xihua Road and Zhongshan Sixth Road, Enning Road–Shishifu Road–Shangxiajiu, and the Beijing Road commercial district feature concentrated clusters of premium dining establishments, forming distinct culinary hubs within their respective zones. The Dongshankou area ranks next in prominence. Simultaneously, areas of significant historical value (such as the arcade ring and Beijing Road) often exhibit higher culinary standards commensurate with their historical context.</p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 473px;" data-ratio="0.7385" data-resizing="0"><img src="assets/1773114216823.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Analysis Map of Dining Spaces in Guangzhou's Old City District</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The study also found that:</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"></p><ol><li><span style="background-color: transparent;">The dining spaces in Guangzhou's old city streets exhibit certain regional clustering patterns and characteristics distinct from the central urban area. Specifically, street-side dining density, vibrancy, and diversity show distinct regional clustering traits; overall consumption levels in these old-city eateries remain relatively low; while the reputation of street-side dining establishments is generally average, areas with higher reputations demonstrate notable regional clustering.</span></li><li>Time-honored establishments embody a city's regional cultural identity and historical traces, while culinary heritage reflects the depth of its dining culture. Guangzhou's historic streets and alleys feature widespread distribution of such establishments across all districts, driving the development of street-side dining throughout the old city.</li><li>The distribution of high-level clustered dining districts in Guangzhou's old city alleys exhibits an east-west axis pattern. This finding closely aligns with the overall layout and transportation conditions of the old city. Key dining hotspots are concentrated in four areas: the Beijing Road Comprehensive Cultural Tourism District, the East Shankou East-West Fusion Zone, the Old Xiguan Traditional Snack District, and the Xihualu Old Cantonese Flavor District. These concentrated zones are often situated near rail transit stations.</li></ol><p></p><p></p><h1>Planning Strategies</h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The dining spaces within Guangzhou's historic alleys and lanes possess rich culinary cultural characteristics and a unique atmosphere of daily life. However, with the advancement of urbanization, an increasing number of alleys in the old city are facing decline. By infusing and preserving cultural elements, along with targeted planning of dining spaces, we can restore and sustain the vitality of these alleys. This approach will contribute to the inheritance of Guangzhou's old city culinary culture and its high-quality development. It is recommended to implement a three-tiered planning strategy for Guangzhou's old-city alleyway dining spaces: leveraging the strengths of time-honored restaurants, establishing distinctive old-city culinary trails, and curating diverse specialty dining experiences.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"></p><ol><li><span style="background-color: transparent;">Point-to-Area Approach: Leverage time-honored culinary brands to develop targeted design guidelines</span></li><li>Line-to-Area Approach: Highlight Guangzhou's culinary heritage through distinctive dining trails</li><li>Area-to-Area Approach: Plan diverse specialty dining experiences based on alleyway evaluations to create vibrant, high-quality culinary districts<span class="Apple-converted-space" style="background-color: transparent;">&nbsp;</span></li></ol><p></p><p></p><p><br></p><h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Further studies have found that</p></h1><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The figure below is a three-dimensional data visualization map, with the base map covering the old city area of Guangzhou. The locations of time-honored brands (blue lines in the figure, where height indicates greater age) and trendy shops (orange lines in the figure, where height indicates greater popularity) differ. Time-honored brands are concentrated in residential areas, while trendy shops cluster around popular attractions like Beijing Road.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 844px;" data-ratio="1.3194" data-resizing="0"><img src="assets/1773116585535.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 814px;" data-ratio="1.2712" data-resizing="0"><img src="assets/1773116585579.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>This diagram reveals the evolution of urban dining spaces. Historically, restaurants primarily served local residents, clustered near residential areas, and were characterized by their age. These “time-honored establishments” gained recognition from locals through years of competition. However, as populations migrated from old neighborhoods, customer bases dwindled, causing these decades-old institutions to decline. Today, dining consumption in old districts is largely sustained by tourists, whose restaurant choices rely heavily on online recommendations. Currently, the most highly rated and trending restaurants are concentrated in tourist hubs like Beijing Road and Dezheng Road. Their average tenure is remarkably short, with most closing within 0-3 years—reflecting the “chasing trends, rapid opening and closing” business strategy prevalent in today's viral dining scene. The overall trend indicates that due to population migration from the old city and the internet's reshaping of dining spaces, Guangzhou's historic district is shifting from a decentralized model serving local residents and dominated by time-honored establishments to a centralized one catering to tourists and featuring trendy pop-up shops.</span></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><br></p></template>
