  <template id="detail-content-zh-template"><div><span style="background-color: transparent; font-size: 0.95rem; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">✨&nbsp;</span><span style="background-color: transparent; font-size: 0.95rem; font-weight: bold;">WUPEN2023 城市设计学生作业国际竞赛提名奖</span></div><p><span style="background-color: transparent; font-size: 0.95rem; font-weight: bold;"><br></span></p><p class="detail-note-text"><span><font><span>设计简介：珠江密布的河网孕育了龙舟为代表的水乡文化。位于广州番禺洛浦岛的上漖村拥有百年龙舟制造基地，其制作龙舟成为村落端午节联谊的精神载体。场地位于广州城市中轴南端，因其重要区位亟待旧改，文化传承面临危机，村民精神家园也因此丢失。同时，洛浦岛因开发年限早，存在生态破坏，配套缺失，用地零散、交通不便的问题。城市设计基于水系和文化引导开发，从而实现发展和文化的共赢。设计基于历史资料还原场地河涌原貌，重构龙舟文化的河道空间和蓝绿骨架。依河道布置龙舟文化节点，形成龙船历史游径和水上交通的出行方式。通过组织系列主题活动唤醒文化记忆，构建龙舟手工艺和水系文化的精神家园。</span></font></span></p><p class=""><span><font><span>广州密布的水网诞生了本土的龙舟文化。龙舟是每个村落的象征，每逢端午，村民会划龙舟沿水路到其他村落拜访。整个活动持续半个月左右，发展出一套别具特色的仪式。</span></font></span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 807px;" data-ratio="1.2615" data-resizing="0"><img src="assets/1773454209498.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">场地有中国南方最大的手工龙舟制作基地，与龙舟文化密切相关</p><p class="">随着城市的扩张，原来位于郊区的场地被纳入发展规划中。由于开发时间较早，缺少规划，场地面临用地零散，交通不便，配套缺失，生态破坏等问题。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 861px;" data-ratio="1.3457" data-resizing="0"><img src="assets/1773454209524.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p class="detail-note-text" style="text-align: center; ">场地分析</p><p><span style="color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">城市设计方案基于原有河道重构了蓝绿空间骨架，成为居民休憩娱乐的场所，依靠水系散步文化节点，从而保育和发展龙舟文化。</span></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 689px;" data-ratio="0.6376" data-resizing="0"><img src="assets/1773454209538.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text">城市设计平面和设计的三种空间展示</p><p style="text-align: center;" class="detail-note-text">（蓝色：居住与商业空间；红色：文化保育空间包括博物馆工坊创作室；绿色：水系绿地等休憩空间）</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 398px;" data-ratio="0.6221" data-resizing="0"><img src="assets/1773454209552.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">鸟瞰效果图</p></template>
  <template id="detail-content-en-template"><div><br></div><p class="detail-note-text"><span style="font-size: 13.76px;">The dense river network of the Pearl River has nurtured a water-related culture,&nbsp;</span><span style="background-color: transparent;">exemplified by the Dragon Boat Festival activities. Shangjie Village in Luopu&nbsp;</span><span style="background-color: transparent;">Island, famous for its century-old dragon boat manufacturing base. The creation&nbsp;</span><span style="font-size: 0.86rem; background-color: transparent;">of dragon boats here has become a spiritual symbol for the village's Dragon&nbsp;</span><span style="background-color: transparent;">Boat Festival visitings. However, this heritage is in danger as the dragon boat&nbsp;</span><span style="font-size: 0.86rem; background-color: transparent;">base will be removed in the upcoming urban regeneration. Additionally, Luopu&nbsp;</span><span style="background-color: transparent;">Island, since developed early, faces problems such as ecological damage, lack&nbsp;</span><span style="font-size: 0.86rem; background-color: transparent;">of amenities and public spaces. Our urban design is guided by ecological and&nbsp;</span><span style="background-color: transparent;">cultural principles. Based on historical materials, the original appearance of&nbsp;</span><span style="font-size: 0.86rem; background-color: transparent;">the site's river channels is restored. Along these waterways, public space nodes&nbsp;</span><span style="background-color: transparent;">showing water-related culture are arranged. The dragon boat manufacturing&nbsp;</span><span style="background-color: transparent;">base is preserved, introducing tourists with the local dragon boat culture. The&nbsp;</span><span style="background-color: transparent;">introduction of various business types such as cultural tourism, workshops,&nbsp;</span><span style="background-color: transparent;">markets, and offices, along with enhanced public services, aims to build a&nbsp;</span><span style="background-color: transparent;">community for both villagers, tourists, and residents.</span></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Guangzhou’s extensive network of waterways has given rise to a distinctive local dragon boat culture. The dragon boat serves as a symbol of each village, and every Dragon Boat Festival, villagers row their dragon boats along the waterways to visit neighboring villages. The festivities last for about two weeks and have developed into a unique set of rituals.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 807px;" data-ratio="1.2615" data-resizing="0"><img src="assets/1773454209498.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">The site is home to the largest handmade dragon boat manufacturing base in southern China and is closely associated with dragon boat culture</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">As the city has expanded, sites that were once located in the suburbs have been incorporated into development plans. Because these areas were developed early on and lacked proper planning, they now face issues such as fragmented land use, poor transportation access, a lack of supporting facilities, and ecological damage.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 861px;" data-ratio="1.3457" data-resizing="0"><img src="assets/1773454209524.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p class="detail-note-text" style="text-align: center; ">Site Analysis</p><p>The urban design plan reimagines the existing river system to create a framework of blue and green spaces, transforming it into a place for residents to relax and enjoy recreational activities. By establishing cultural hubs along the waterways, the plan aims to preserve and promote dragon boat culture.</p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 689px;" data-ratio="0.6376" data-resizing="0"><img src="assets/1773454209538.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text">Urban Design Plan and Three Types of Spatial Displays</p><p style="text-align: center;" class="detail-note-text">(Blue: Residential and commercial spaces; Red: Cultural heritage spaces, including museums, workshops, and studios; Green: Recreational spaces such as waterfront areas and green spaces)</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 398px;" data-ratio="0.6221" data-resizing="0"><img src="assets/1773454209552.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">Aerial view rendering</p></template>
