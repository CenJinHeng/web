  <template id="detail-content-zh-template"><p class="">建造时间是2017-2021，共计四年时间。使用Minecraft游戏作为平台进行建模。图片采用chunky等渲染工具制作。</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" data-ratio="0.5576" style="overflow: visible; width: 720px; height: 401px;" data-resizing="0"><img src="assets/1773524255044.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">从海边拍摄城市天际线</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 402px;" data-ratio="0.5581" data-resizing="0"><img src="assets/1773524255099.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">从海岸上俯拍</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5594" data-resizing="0"><img src="assets/1773524255131.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">岛上耸立的鹿雕像作为城市象征，参考纽约自由女神像</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 476px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1773524255161.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">空中俯瞰的城市平面（AI修复）</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 401px;" data-ratio="0.5567" data-resizing="0"><img src="assets/1773524255192.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 480px;" data-ratio="0.6670" data-resizing="0"><img src="assets/1773524255213.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">欧式风情区，以独栋欧式建筑为主</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5599" data-resizing="0"><img src="assets/1773524255236.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">参考了上海外滩和陆家嘴的对比关系</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5596" data-resizing="0"><img src="assets/1773524255270.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">前面是商业综合体和办公酒店塔楼</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5595" data-resizing="0"><img src="assets/1773524255300.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">重奢商场立面造景</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 402px;" data-ratio="0.5589" data-resizing="0"><img src="assets/1773524255330.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">建设工地场景</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 330px;" data-ratio="0.4584" data-resizing="0"><img src="assets/1773524255364.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">城市全景</p><p class="detail-note-text" style="text-align: center; "></p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; heigh   <template id="detail-content-en-template"><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The construction took place from 2017 to 2021, spanning a total of four years. Minecraft was used as the platform for modeling. The images were created using rendering tools such as Chunky.</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" data-ratio="0.5576" style="overflow: visible; width: 720px; height: 401px;" data-resizing="0"><img src="assets/1773524255044.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Photographing the city skyline from the beach</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 402px;" data-ratio="0.5581" data-resizing="0"><img src="assets/1773524255099.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Aerial view from the coast</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5594" data-resizing="0"><img src="assets/1773524255131.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">The statue of a deer standing tall on the island serves as a symbol of the city, modeled after the Statue of Liberty in New York</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 476px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1773524255161.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">Aerial view of the city layout (AI-restored)</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 401px;" data-ratio="0.5567" data-resizing="0"><img src="assets/1773524255192.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 480px;" data-ratio="0.6670" data-resizing="0"><img src="assets/1773524255213.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">European-style District, featuring primarily standalone European-style buildings</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5599" data-resizing="0"><img src="assets/1773524255236.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">Drawing on the contrast between the Bund and Lujiazui in Shanghai</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5596" data-resizing="0"><img src="assets/1773524255270.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">In front are a commercial complex and office-hotel towers</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 403px;" data-ratio="0.5595" data-resizing="0"><img src="assets/1773524255300.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Landscaping for the facade of a luxury shopping mall</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 402px;" data-ratio="0.5589" data-resizing="0"><img src="assets/1773524255330.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Construction Site</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 330px;" dat
