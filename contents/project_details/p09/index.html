  <template id="detail-content-zh-template"><div><b><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">✨&nbsp;</span><span style="background-color: transparent;">中国人居环境设计学年奖城市设计铜奖，全国大学生城乡规划毕业设计（论文）竞赛三等奖，校级优秀毕业设计/论文（专业唯一）</span></b></div><p></p><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 534px;" data-ratio="0.7416" data-resizing="0"><img src="assets/1772850809095.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><span style="color: rgb(102, 102, 102);">项目概要：</span></p><p><span style="color: rgb(102, 102, 102); background-color: transparent;">广州站以北的三元里片区，经历了抗英斗争、改革开发带来的商贸批发业的蓬勃发展和作为广交会交流示范的窗口，在广州火车站谋划“高铁入城”背景下，迎来新的发展机遇。</span><span style="color: rgb(102, 102, 102); background-color: transparent;"><span>&nbsp;</span></span><span style="color: rgb(102, 102, 102); background-color: transparent;">设计方案</span><span style="background-color: transparent; color: rgb(230, 145, 56);"><b><span>延续了历史进程中塑造车站南北空间的内在逻辑，创造了具有差异性的南北广场</span>。</b></span><span style="color: rgb(102, 102, 102); background-color: transparent;">通过林荫道，连廊与广场形成的丰富点轴空间，提出打造“城镇景观”的理念，串联传承记忆的场所，呼应广州老城自南向北的文脉，商脉和绿脉。&nbsp;</span></p><p><span><span style="color: rgb(102, 102, 102);">为实现规划目标而提出</span><span style="background-color: rgb(255, 221, 0); color: rgb(0, 0, 0);"><b>形塑开发</b></span><span style="color: rgb(102, 102, 102);">的模式与方法。基于访谈与调研，设计将参与开发的多方浓缩为政府、开发商、业主、公众四个角色并进行磋商，确定共同的发展目标。各方</span><span style="color: rgb(230, 145, 56);"><b><span style="background-color: transparent;">基于经济可行性进行合作，制定片区开发综合解决方案，并通过公法与私法对空间规划要素进行固定</span>。</b></span><span style="color: rgb(102, 102, 102);">公法（法定规划）包括——交通规划、片区规划结构、
开发强度控制、公私空间划分、公共空间体系、功能分区层层递进的规划逻辑。私法（开发协议）
兼顾灵活性与规划实施，实现合作共赢与项目运营的可持续发展。
	 	 我们所提出的设计理念和形塑开发的模式，
创造了连接铁路线南北的中央走廊、合作开发的
TOD 城市核、自主更新住区等</span><span style="color: rgb(230, 145, 56);"><b><span style="background-color: transparent;">富有想象力、地方场所感与跨越产权边界</span><span>的空间设计。体现了</span><span style="background-color: transparent;">制定城市开发综合解决方案，实现项目良性合作与可持续发展的美好前景与可行性。</span></b></span></span></p><h1>1 项目概况</h1><h2>场地研判</h2><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6612" data-resizing="0"><img src="assets/1772850809120.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 713px;" data-ratio="0.6603" data-resizing="0"><img src="assets/1772850809133.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>发展基础</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 715px;" data-ratio="0.6622" data-resizing="0"><img src="assets/1772850809144.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h1>2 设计策略</h1><h2>形塑开发方法论</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 724px;" data-ratio="0.6702" data-resizing="0"><img src="assets/1772850809153.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>开发流程</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 713px;" data-ratio="0.6599" data-resizing="0"><img src="assets/1772850809163.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1100px; height: 714px;" data-ratio="0.6612" data-resizing="0"><img src="assets/1772850809173.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>总平面图</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 715px;" data-ratio="0.6618" data-resizing="0"><img src="assets/1772850809189.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h1>3 规划方案</h1><h2>规划策略</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 715px;" data-ratio="0.6618" data-resizing="0"><img src="assets/1772850809202.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>空间结构</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 724px;" data-ratio="0.6702" data-resizing="0"><img src="assets/1772850809214.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>开发协议</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1772850809227.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h1>4 空间愿景展示</h1><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1772850809242.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1772850809255.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1772850809268.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6615" data-resizing="0"><img src="assets/1772850809280.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1100px; height: 713px;" data-ratio="0.6602" data-resizing="0"><img src="assets/1772850809294.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h1>结语</h1><p><span>我们毕业设计是在2024年的上半年，<span style="color: rgb(230, 145, 56);"><b>中国城市规划行业来到了十字路口</b></span>——随着大规模城镇化的结束，以及房地产行业的“暴雷”，以空间设计为导向的城市规划作为上一段特殊时期的工具正面临被淘汰的风险。控制性详细规划，城市设计曾是规划行业的收入支柱，如今业务大幅萎缩，<span style="color: rgb(230, 145, 56);"><b>城市规划该如何实现转型？</b><br></span></span></p><p><span><span><span style="color: rgb(230, 145, 56);"><b>城市更新是发展的必然方向，然而现有更新模式存在诸多不足：</b></span>行政力量主导缺乏经济利益考量，对场地产业商业文化的生态造成消极影响，缺少平衡公众利益，可持续发展与运营能力有限等，导致城市更新往往未能实现既定目标。</span></span></p><p>我们所提出的<span style="background-color: rgb(255, 221, 0);"><b>形塑开发</b></span>的模式——选择和关注塑造城市地区发展的核心关系，针对这些关系进行核心敢于。从而创造了富有想象力、地方场所感与跨越产权边界的空间设计。体现了多元主体全流程参与片区开发，实现项目良性合作与可持续发展的美好前景与可行性。</p><p><br></p></template>
  <template id="detail-content-en-template"><div><br></div><p></p><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 534px;" data-ratio="0.7416" data-resizing="0"><img src="assets/1772850809095.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><strong style="caret-color: rgb(0, 0, 0); background-color: transparent; color: rgb(102, 102, 102);">Project Overview:</strong></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(102, 102, 102);">The Sanyuanli area, located north of Guangzhou Railway Station, has experienced several historical phases, including the anti-British resistance movement, the rapid growth of wholesale trade brought by economic reform and opening-up, and its role as a demonstration window for exchanges during the Canton Fair. Under the current context of planning to bring<span class="Apple-converted-space">&nbsp;</span>high-speed rail into the city<span class="Apple-converted-space">&nbsp;</span>at Guangzhou Railway Station, the area is facing new development opportunities.</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(230, 145, 56);"><b><span>The design proposal continues the internal logic that historically shaped the north–south spatial structure of the station, creating differentiated plazas on the north and south sides.</span> </b></span><span style="color: rgb(102, 102, 102);">Through the spatial organization of<span class="Apple-converted-space">&nbsp;</span>tree-lined boulevards, corridors, and plazas, forming a rich sequence of nodes and axes, the project proposes the concept of creating an<span class="Apple-converted-space">&nbsp;</span>“urban landscape.”<span class="Apple-converted-space">&nbsp;</span>This landscape connects places that preserve collective memory and echoes the cultural, commercial, and ecological continuities of Guangzhou’s historic city from south to north.</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(102, 102, 102);">To achieve the planning objectives, the project proposes a</span><span class="Apple-converted-space" style="color: rgb(102, 102, 102);">&nbsp;</span><span style="color: rgb(102, 102, 102);">development framework and implementation methodology-</span><span style="background-color: rgb(255, 221, 0); color: rgb(0, 0, 0);"><b>Shaping Development</b></span><span style="color: rgb(102, 102, 102);">. Based on interviews and research, the stakeholders involved in development are distilled into four roles—government, developers, property owners, and the public—who negotiate to establish shared development goals. </span><span style="color: rgb(230, 145, 56);"><b>Each party collaborates based on economic feasibility to formulate a comprehensive development solution for the district, while spatial planning elements are secured through both<span class="Apple-converted-space">&nbsp;</span>public law and private law<span class="Apple-converted-space">&nbsp;</span>mechanisms.</b></span><span style="color: rgb(102, 102, 102); background-color: transparent;">Public law (statutory planning) includes a hierarchical planning logic covering</span><span class="Apple-converted-space" style="color: rgb(102, 102, 102); background-color: transparent;">&nbsp;</span><span style="color: rgb(102, 102, 102); background-color: transparent;">transportation planning, district spatial structure, development intensity control, public–private space allocation, public space systems, and functional zoning</span><span style="color: rgb(102, 102, 102); background-color: transparent;">. Private law (development agreements) balances flexibility with implementation, enabling cooperative outcomes and the sustainable operation of the project.</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(102, 102, 102);">The proposed design concept and development-shaping approach create imaginative spatial interventions that cross property boundaries and foster a strong sense of place, including<span class="Apple-converted-space">&nbsp;</span>a central corridor connecting the north and south sides of the railway, a collaboratively developed TOD urban core, and self-renewing residential communities. </span><span style="color: rgb(230, 145, 56);"><b>These proposals demonstrate the feasibility and potential of establishing a comprehensive urban development solution that supports effective collaboration and long-term sustainable development.</b></span></p><p style="caret-color: rgb(0, 0, 0);"><b style="color: rgb(0, 0, 0);">No translation for the contents below</b></p><h1>1 Project Overview</h1><h2>Site analysis</h2><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 714px;" data-ratio="0.6612" data-resizing="0"><img src="assets/1772850809120.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 713px;" data-ratio="0.6603" data-resizing="0"><img src="assets/1772850809133.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>Foundation for Development&nbsp;</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 715px;" data-ratio="0.6622" data-resizing="0"><img src="assets/1772850809144.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; "color: rgb(230, 145, 56);"><b>How can urban planning achieve transformation?</b></span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(230, 145, 56);"><b>Urban renewal represents an inevitable developmental path. However, existing renewal models suffer from numerous shortcomings:</b></span><span style="color: rgb(0, 0, 0);"><b> </b>administrative dominance without economic incentives negatively impacts site-specific industrial, commercial, and cultural ecosystems; inadequate balancing of public interests; and limited sustainability and operational capacity. These flaws often prevent urban renewal from achieving its intended goals.</span></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Our proposed <span style="background-color: rgb(255, 221, 0);"><b>Shaping Development model</b></span>—selecting and focusing on core relationships that shape urban district development, then boldly intervening in these relationships—creates imaginative spatial designs rich in local character and transcending property boundaries. This approach embodies the promising and feasible vision of multi-stakeholder, full-process participation in district development, enabling positive project collaboration and sustainable growth.</p><p><br></p></template>
