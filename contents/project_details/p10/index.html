  <template id="detail-content-zh-template"><div><span style="color: rgb(255, 255, 255);"><b>项目基于百万级别的出行坐标（起点-终点）进行模拟，精细化的度量城市各区域的联系度和人流聚集强度。</b></span><span style="background-color: transparent; font-size: 15.2px;"><font color="#ffffff">针对拓扑形式的OD起始数据信息密度低，不落实际空间的问题，提出采用路径模拟深入挖掘。请求地图API获取模拟结果，基于20万条出行数据计算东莞12镇的道路使用量，识别各镇实际的人流聚集规模，边界与联系度。分析结果为项目定位与交通路网优化提供重要参考。&nbsp;</font></span></div><h2><span style="color: rgb(255, 255, 255);">城市区域出行模拟效果可视化</span></h2><p></p><div class="image-wrapper align-left" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" data-ratio="0.5376" style="overflow: visible; width: 1079.98px; height: 581px;" data-resizing="0"><img src="assets/1773282198772.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2><span style="color: rgb(255, 255, 255);">区域联系度结果分析</span></h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 611px;" data-ratio="0.9554" data-resizing="0"><img src="assets/1773282198782.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2><span style="color: rgb(255, 255, 255);">区域联系拓扑图</span></h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 583px;" data-ratio="0.9112" data-resizing="0"><img src="assets/1773282198787.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><br></p><h2>主项目概况</h2><p>两条新建的高铁线在东莞洪梅镇交汇，为这个地方带来发展机遇。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 260px;" data-ratio="0.8110" data-resizing="0"><img src="assets/1773284098314.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">项目区位图</p><p>规划方案围绕高铁站进行TOD开发（下图红色圆圈），引入外部资源，增强区域合作。打造内环增强内部活力（下图橙色环）。构筑蓝绿生态基底（下图蓝色和绿色的箭头）形成差异化城市景观。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" data-ratio="1.0468" style="overflow: visible; width: 320px; height: 335px;" data-resizing="0"><img src="assets/1773284098320.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">土地利用规划结构</p><p>新的土地利用规划体现了<b>交通优化、产业发展、公服设施补齐和生态保护</b>四个方面的规划策略。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 277px;" data-ratio="0.4335" data-resizing="0"><img src="assets/1773284098324.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">土地利用规划策略</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 545px;" data-ratio="0.8523" data-resizing="0"><img src="assets/1773284098330.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">土地利用规划图</p><p></p><p></p></template>
  <template id="detail-content-en-template"><p><span style="font-size: 15.2px; color: rgb(255, 255, 255); font-weight: bold;">This project simulates travel patterns based on millions of origin-destination pairs, providing granular measurements of connectivity and density across urban areas.&nbsp;</span><span style="color: rgb(255, 255, 255);"><span style="caret-color: rgb(0, 0, 0); background-color: transparent; font-size: 0.95rem;">To address the low density of initial OD data for topological forms and the issue of not reflecting actual spatial patterns, we propose employing path simulation for in-depth analysis. By requesting map APIs to obtain simulation results and calculating road usage across Dongguan's 12 towns based on 200,000 travel records, we identify each town's actual pedestrian gathering scale, boundaries, and connectivity. The analysis provides crucial reference for project positioning and transportation network optimization.</span><span class="Apple-converted-space" style="caret-color: rgb(0, 0, 0); background-color: transparent; font-size: 0.95rem;">&nbsp;</span></span></p><h2><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">Visualization of Travel Simulation</span></p></h2><p></p><div class="image-wrapper align-left" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" data-ratio="0.5376" style="overflow: visible; width: 1079.98px; height: 581px;" data-resizing="0"><img src="assets/1773282198772.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">Analysis of Regional Connectivity Results</span></p></h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 611px;" data-ratio="0.9554" data-resizing="0"><img src="assets/1773282198782.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">Regional Connectivity Topology Map</span></p></h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 583px;" data-ratio="0.9112" data-resizing="0"><img src="assets/1773282198787.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><br></p><p></p></template>
