  <template id="detail-content-zh-template"><div><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">✨&nbsp;</span><b><span style="background-color: transparent; color: rgb(255, 255, 255);">国家级大学生创新创业项目（10000 元资助），</span><span style="background-color: transparent; color: rgb(255, 255, 255);">发表英文论文一篇，城市规划年会论文一篇，会议宣讲一次，专利公示一项</span></b></div><p><span style="background-color: transparent; color: rgb(255, 255, 255);"><br></span></p><p><span style="color: rgb(255, 255, 255);">项目简介：通过对专利数据进行时空分析，研究发现深圳的创新活动有从城区外溢到郊区的趋势。郊区该如何把握机遇，培育和吸引更多的创新公司和人才？本研究结合了POI，街景等多种城市大数据，使用可解释机器学习模型进行深入分析，探究影响因素和创新活动的非线性关系。研究基于创新基础设施、公服配套、交通、成本和建成环境五大维度评估郊区哪里成为新的创新中心的潜力大，哪个方面需要提升，并输出了对应的提升策略。</span></p><p><span style="background-color: transparent; color: rgb(255, 255, 255);"><br></span></p><h1><span style="color: rgb(255, 255, 255);">研究背景</span></h1><p><font color="#ffffff">我们使用专利数量来代表一个地方的创新活动，专利越多，说明这个地方的创新活动越多</font></p><p><font color="#ffffff">我们使用1千米*1千米的网格将深圳市切分成2400多个网格单元</font></p><p><font color="#ffffff">基于时空聚类的分析，我们总结了深圳1985-2020年创新的分布模式：（1）创新活动集中在“关内”地区（2）创新活动的分布从集中到散布</font></p><p><font color="#ffffff"><br></font></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 756px;" data-ratio="1.1818" data-resizing="0"><img src="assets/1773199107326.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p class="detail-note-text" style="text-align: center; ">深圳创新活动的时空分布</p><p></p><p>g<span style="color: rgb(255, 255, 255);">聚类分析发现了两种趋势：有的地方创新活动在最近几年下降了（下图的Cluster 1）；有的地方创新活动一直表现平平，但最近几年增长很快</span><span style="color: rgb(255, 255, 255); background-color: transparent;">（下图的Cluster 2）</span><span style="color: rgb(255, 255, 255); background-color: transparent;">。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 453px;" data-ratio="0.7080" data-resizing="0"><img src="assets/1773199107335.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p></p><p class="detail-note-text" style="text-align: center; "><span>创新活动的两种趋势</span></p><p><span style="background-color: transparent; color: rgb(255, 255, 255);">当我们把这两种趋势在地图上可视化的时候，我们发现呈现下降趋势的地方（地图中蓝色的网格）集中在“关内”，呈现增长趋势的地方</span><span style="background-color: transparent; color: rgb(255, 255, 255);">（地图中粉红色的网格）</span><span style="background-color: transparent; color: rgb(255, 255, 255);">集中在郊外。说明创新活动正在从城区外溢到郊区（i.e. 有创新能力的公司正在向郊区迁移; 郊区公司创新能力增强）。</span><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 305px;" data-ratio="0.4760" data-resizing="0"><img src="assets/1773199107341.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><br><p></p><p style="text-align: center;" class="detail-note-text">两种趋势的分布</p><p><span><br></span></p><p><span><br></span></p><h1><span>研究过程</span></h1><h2><span>建模分析</span></h2><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">在创新外溢的背景下，郊区的决策者面临的核心问题是：<span>如何把握机遇，吸引和培育更多的创新公司和人才，成为城市新的创新增长极？</span></span></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">创新城市的相关理论表明，创新活动主要依赖于以下五个方面：</span><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">创新基础设施（科研中心、孵化器、金融机构等）、公服配套、交通、成本、城市建成环境</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 393px;" data-ratio="0.6145" data-resizing="0"><img src="assets/1773199107349.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">创新活动影响因素可视化</p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">研究主要使用<span>树模型（Tree-based Models）</span>进行建模，包括决策树、随机森林以及Boosting系列的GBM，XGBoost等，还选择传统的线性模型以及支持向量机（SVM）作为参考，基于R方，MSE和RMSE选择最佳模型。最终选择随机森林算法，R方=0.71，意味着71%的观察点可以被该模型解释。</span></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">在传统的线性回归中，我们认为一个变量增加，另一个变量也必然增加，这并不符合现实情况。现实中，<span>大多数变量都有边际效益</span>——当增长过了某个“门槛”数值后，增长会放缓；有些时候甚至会“物极必反”——变量随着另一个变量的增加，先增加后减少。为了提供更加真实可用的见解，捕抓变量间非线性的关系，研究使用了可解释机器学习工具SHAP，量化每个创新影响因素的“门槛”与非线性效应。</span></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">大多数影响因素都有“门槛”，到达“门槛”后几乎不再增长。这对于在有限资源下制定支持创新的策略具有重要意义——<span>将资源投放在最需要的地方，而不是一味追求某个指标的上升</span>。还</span><span style="color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0); background-color: transparent;">有的影响因素控制在一定区间时对创新活动的贡献最大，如租金。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 599px;" data-ratio="0.9353" data-resizing="0"><img src="assets/1773199107356.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">局部关系依赖图，展示影响因素和创新活动的非线性关系</p><h2><span>空间评估</span></h2><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">通过空间残差图，研究定位了创新预测结果和实际情况存在gap的地方。这些偏离回归模型的地方说明<span>模型中的变量未能完全解释该区域的创新活动，存在未被捕抓的因素</span>：如政策支持、历史产业集群、投资环境、企业总部等。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 375px;" data-ratio="0.5859" data-resizing="0"><img src="assets/1773199107362.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">创新活动的空间残差图</p><p></p><p></p><p></p><div class="detail-columns-block" data-columns-count="2" data-columns-color="#f5fbff" style="--columns-count: 2; --columns-bg: #f5fbff;"><div class="detail-columns-cell" data-column-index="1"><p><span style="color: rgb(36, 99, 166);"><span>蓝色区域：</span><span>预测创新 &gt; 实际创新</span></span></p><p><span><span>地区特征：</span></span><span>创新潜力未被释放</span></p><p></p><ul><li><span>创新条件很好</span></li><li><span>理应有很多创新活动，</span><span>但现实创新活动不足</span></li></ul><div><span>规划对策：释放潜力</span><span></span></div><div><ul><li><span>可能缺少政策支持</span></li><li><span>创新资源未被激活<br></span></li><li><span>提供可负担的租赁空间</span></li><li><span>城市更新</span></li></ul><div><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 361px; height: 420px;" data-ratio="1.1625" data-resizing="0"><img src="assets/1773199107368.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div></div></div><p></p></div><div class="detail-columns-cell" data-column-index="2"><p><span style="color: rgb(177, 25, 45);">红色区域：预测创新 &lt; 实际创新</span></p><p><span>地区特征：特殊因素驱动创新</span></p><p></p><ul><li><span>创新条件并没有那么好</span></li><li><span>模型预测创新活动少，实际创新活动多</span></li></ul><div><span>规划对策：支撑增长</span></div><div><ul><li><span>更好的支持现有创新模式</span></li><li><span>优化交通与公服支持更高强度的创新活动</span></li><li><span>保持低成本（租金）</span></li><li><span>强化创新集群效应</span></li></ul><div style="text-align: center;"><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 374px; height: 420px;" data-ratio="1.1235" data-resizing="0"><img src="assets/1773199107376.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div></div></div><p></p></div></div><p><br></p><h2>打造创新城区的策略</h2><p>基于以上分析结果，研究从<span style="color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0); background-color: transparent;">创新基础设施、公服配套、交通、成本、城市建成环境五个维度，为郊区打造创新城区提供策略参考。<span>R&amp;D中心、办公空间的可获得性、研究机构、创客空间和办公租金</span>是最重要的五个因素。</span></p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="width: 720px; height: 338px; overflow: visible;" data-ratio="0.4692" data-resizing="0"><img src="assets/1772774857471.jpg" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;">创新支持因素的重要性（左）和创新城区策略效果（右）</p><p></p><p>研究结果为打造创新城区提供<span>指标参考</span>：当某个指标达到其门槛值后，应该关注其他指标的提升，从而实现精准提升。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" data-ratio="0.2730" style="overflow: visible; width: 640px; height: 175px;" data-resizing="0"><img src="assets/1773199107381.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">创新支持因素指标</p><p></p><p></p><p></p><p></p><p></p><p></p><p></p></template>
  <template id="detail-content-en-template"><div><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">✨&nbsp;</span><span style="background-color: transparent;"><font color="#ffffff"><b>National College Student Innovation and Entrepreneurship Project (10,000RMB funding), one paper presented at the Annual Conference on Urban Planning, one conference presentation, one patent announcement.</b></font></span></div><p><span style="background-color: transparent; color: rgb(255, 255, 255);"><br></span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">Project Overview: Through spatio-temporal analysis of patent data, research reveals a trend of innovation activities spilling over from urban districts to suburban areas in Shenzhen. How can suburban areas seize this opportunity to cultivate and attract more innovative companies and talent? This study integrates diverse urban big data sources—including Points of Interest (POI) and street-level imagery—and employs explainable machine learning models for in-depth analysis. It explores the nonlinear relationships between influencing factors and innovation activities. The study evaluates suburban areas' potential to become new innovation hubs across five dimensions: innovation infrastructure, public services, transportation, costs, and built environment. It identifies areas requiring improvement and generates corresponding enhancement strategies.</span></p><h1><span style="color: rgb(255, 255, 255);">Background</span></h1><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">We use the number of patents to represent a region's innovation activity, with more patents indicating greater innovation.</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">We divided Shenzhen into over 2,400 grid cells using a 1km × 1km grid.</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">Based on spatio-temporal clustering analysis, we summarized Shenzhen's innovation distribution patterns from 1985 to 2020:</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">(1) Innovation activity is concentrated in the “Inner Shenzhen” area.</span></p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">(2) The distribution of innovation activity has shifted from concentrated to dispersed.</span></p><p><font color="#ffffff"><br></font></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 756px;" data-ratio="1.1818" data-resizing="0"><img src="assets/1773199107326.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p class="detail-note-text" style="text-align: center;">Spatial and Temporal Distribution of Innovation Activities in Shenzhen</p><p></p><p><span style="color: rgb(255, 255, 255);"><span style="caret-color: rgb(0, 0, 0); background-color: transparent;">Cluster analysis revealed two distinct trends: some regions have experienced a decline in innovation activity in recent years (Cluster 1 in the figure below); others hav</span></span><span style="caret-color: rgb(0, 0, 0); background-color: transparent; color: rgb(255, 255, 255);">e maintained relatively stable innovation activity but have seen rapid growth in recent years (Cluster 2 in the figure below).</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 453px;" data-ratio="0.7080" data-resizing="0"><img src="assets/1773199107335.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p></p><p class="detail-note-text" style="text-align: center;">Two Trends in Innovation Activities</p><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">When we visualize these two trends on a map, we observe that areas showing a declining trend (blue grid on the map) are concentrated within the urban core, while areas exhibiting growth (pink grid) cluster in the suburbs. This indicates that innovation activity is spilling over from the city center to the outskirts—meaning innovative companies are relocating to suburban areas, and suburban firms are enhancing their innovation capabilities.</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 305px;" data-ratio="0.4760" data-resizing="0"><img src="assets/1773199107341.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><p style="text-align: center;" class="detail-note-text">Distribution of the Two Trends</p><p><span><br></span></p><p><span><br></span></p><h1><span>Research Process</span></h1><h2><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Modeling Analysis</p></h2><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Against the backdrop of innovation spillover, the core challenge facing suburban policymakers is: <span>How can they seize opportunities to attract and nurture more innovative companies and talent, thereby becoming new hubs of urban innovation growth?</span></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Relevant theories on innovation cities indicate that innovation activities primarily depend on five key factors: <span>innovation infrastructure (research centers, incubators, financial institutions, etc.), public service support, transportation, costs, and the built urban environment.</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 393px;" data-ratio="0.6145" data-resizing="0"><img src="assets/1773199107349.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Visualization of Factors Influencing Innovation Activities</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The study primarily employed <span>tree-based models</span> for modeling, including decision trees, random forests, and boosting algorithms such as GBM and XGBoost. Traditional linear models and support vector machines (SVM) were also selected for comparison. The optimal model was chosen based on R-squared, MSE, and RMSE. The random forest algorithm was ultimately selected, achieving an R-squared value of 0.71, indicating that 71% of the observations could be explained by this model.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">In traditional linear regression, we assume that an increase in one variable necessarily leads to an increase in another, which does not align with reality. In practice, <span>most variables exhibit marginal effects</span>—growth slows after exceeding a certain “threshold” value. Sometimes, the opposite occurs: a variable increases initially but then decreases as another variable increases. To provide more actionable insights and capture these nonlinear relationships, the study employed the interpretable machine learning tool SHAP to quantify the “threshold” and nonlinear effects of each innovation driver.</p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Most factors exhibit a “threshold” beyond which growth plateaus. This is crucial for designing innovation support strategies with limited resources—<span>allocating resources where they matter most, rather than chasing arbitrary metric increases</span>. Other factors, like rent, yield maximum contribution to innovation activity when maintained within specific ranges.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 599px;" data-ratio="0.9353" data-resizing="0"><img src="assets/1773199107356.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Partial Relationship Dependency Diagram, illustrating the nonlinear relationship between influencing factors and innovation activities</p><h2><span>Spatial Evaluation</span></h2><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Through spatial residual maps, the study identified gaps between innovation forecast outcomes and actual conditions. These deviations from the regression model indicate that <span>the variables within the model fail to fully explain innovation activities in the region, suggesting the presence of unaccounted factors</span> such as policy support, historical industrial clusters, investment environments, and corporate headquarters.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 375px;" data-ratio="0.5859" data-resizing="0"><img src="assets/1773199107362.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Spatial Residual Map of Innovation Activities</p><p></p><p></p><p></p><div class="detail-columns-block" data-columns-count="2" data-columns-color="#f5fbff" style="--columns-count: 2; --columns-bg: #f5fbff;"><div class="detail-columns-cell" data-column-index="1"><p><span style="caret-color: rgb(0, 0, 0); color: rgb(52, 101, 154);">Blue Zone: Predicted Innovation &gt; Actual Innovation</span></p><p></p><ul><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The conditions for innovation are excellent.</p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>There should be a great deal of innovation activity, but in reality, innovation activity is insufficient.</span></p></li></ul><div><span>Planning Strategy: Unlocking Potential</span></div><div><ul><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Potential lack of policy support</p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Urban renewal</span></p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Providing affordable rental space</span></p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Innovation resources remain untapped</span></p></li></ul><div><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 361px; height: 420px;" data-ratio="1.1625" data-resizing="0"><img src="assets/1773199107368.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div></div></div><p></p></div><div class="detail-columns-cell" data-column-index="2"><p><span style="color: rgb(177, 25, 45);">Red Zone: Predicted Innovation &lt; Actual Innovation</span></p><ul><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The conditions for innovation are not particularly favorable.</p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Models predict low levels of innovation activity, while actual innovation activity is high.</span></p></li></ul><div><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Planning Strategy: Supporting Growth</span></p></div><div><ul><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Enhance support for existing innovation models</p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Strengthen innovation cluster effects</span></p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Maintain low costs (rent)</span></p></li><li><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>Optimize transportation and public services to support higher-intensity innovation activities</span></p></li></ul><div style="text-align: center;"><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 374px; height: 420px;" data-ratio="1.1235" data-resizing="0"><img src="assets/1773199107376.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div></div></div><p></p></div></div><p><br></p><h2></h2><h3>Strategies for Building an Innovation District</h3><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Based on the above analysis, this study provides strategic recommendations for developing suburban innovation districts across five dimensions: innovation infrastructure, public service facilities, transportation, costs, and built environment. The five most critical factors are <span>the availability of R&amp;D centers and office space, research institutions, maker spaces, and office rental rates.</span></p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="width: 720px; height: 338px; overflow: visible;" data-ratio="0.4692" data-resizing="0"><img src="assets/1772774857471.jpg" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></div><p class="detail-note-text" style="text-align: center;">Importance of Innovation Support Factors (Left) and Effectiveness of Innovation District Strategies (Right)</p><p></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Research findings provide benchmark references for developing innovative districts: Once a metric reaches its threshold value, attention should shift to enhancing other metrics to achieve targeted improvements.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" data-ratio="0.2730" style="overflow: visible; width: 640px; height: 175px;" data-resizing="0"><img src="assets/1773199107381.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">Innovation Support Factors Index</p><p></p><p></p><p></p><p></p><p></p><p></p><p></p></template>
