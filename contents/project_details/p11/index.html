  <template id="detail-content-zh-template"><p class=""><span style="color: rgb(255, 255, 255);">设计简介：广州老城区的</span><span style="color: rgb(255, 255, 255); background-color: transparent; font-size: 0.95rem;">荔枝湾涌和恩宁路都有悠长的历史和丰富的故事，</span><span style="color: rgb(255, 255, 255); background-color: transparent; font-size: 0.95rem;">项目位于他们的交界处。设计希望打造一个游径上的地标性的建筑：通过流线造型模拟河流冲击路堤的泛波。建筑巧妙利用恩宁路桥和地块的高差，游客可以沿着一侧的缓坡走上屋顶花园观光。内部延续了和外部造型一致的坡度，打造丰富的内部空间。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 496px;" data-ratio="0.4597" data-resizing="0"><img src="assets/1773286681067.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><br></p><p></p><p><br></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 465px;" data-ratio="1.4516" data-resizing="0"><img src="assets/1773286681076.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">设计生成过程</p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 368px;" data-ratio="0.5745" data-resizing="0"><img src="assets/1773286681080.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text">手绘渲染图</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 207px;" data-ratio="0.3232"   <template id="detail-content-en-template"><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(255, 255, 255);">Design Concept: Located at the junction of Lizhiwan Creek and Enning Road in Guangzhou's historic district—both steeped in history and rich narratives—the project aims to create a landmark structure along the waterfront promenade. Its fluid form mimics the rippling waves generated when river currents impact embankments. The building cleverly utilizes the elevation difference between Enning Road Bridge and the site. Visitors can ascend to the rooftop garden via a gentle slope on one side. Internally, the same gradient as the exterior form creates a richly varied spatial experience.</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 496px;" data-ratio="0.4597" data-resizing="0"><img src="assets/1773286681067.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p><br></p><p></p><p><br></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 465px;" data-ratio="1.4516" data-resizing="0"><img src="assets/1773286681076.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Design Generation Process</p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 368px;" data-ratio="0.5745" data-resizing="0"><img src="assets/1773286681080.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; t
