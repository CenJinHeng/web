  <template id="detail-content-zh-template"><p class="detail-note-text"><font>项目概要：</font><span><span>宾大的导航页和选课系统是学生最常使用的功能，但长期以来饱受诟病。</span>常见的用户反馈包括“找不到功能入口”“不清楚选课流程”“不知道是否成功选上课程”等。在一项调查中，超过 </span><b>60%</b><span> 的学生对导航页的使用体验表示不满，而对选课流程不满意的比例更高达</span><b> 85%</b><span>。</span></p><p data-start="44" data-end="181" class="detail-note-text"><font>基于用户调研，项目组发现<b>信息展示混乱、选课操作逻辑不清晰</b>等关键痛点，对导航页的页面架构和选课系统的交互逻辑进行了重构，并通过多轮用户测试迭代和优化。</font></p><p data-start="44" data-end="181" class="detail-note-text"><font><span>与旧版相比，用户对新版导航页满意度大幅提高</span><span>，而新版选课操作的成功率提升了 </span><b>66%</b><span>，改版设计显著改善了使用体验。</span></font></p><p data-start="44" data-end="181" class="detail-note-text"><font size="3"><span><br></span></font></p><h1><span>1 项目介绍</span></h1><h2><span>1.1 设计对象</span></h2><p><span><br></span></p><div class="detail-columns-block" data-columns-count="2" data-columns-color="#ffffff" style="--columns-count: 2; --columns-bg: #ffffff;"><div class="detail-columns-cell" data-column-index="1"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 500px; height: 327px; overflow: visible;" data-ratio="0.6533" data-resizing="0"><font><img src="assets/1771801667666.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><b>导航页（优化后）</b><br><p class="detail-note-text">导航页是门户网站,罗列了学校各种服务的入口, 包括选课系统、修改个人档案、申请经济资助、查找学习资源等。</p><p></p></font></div><div class="detail-columns-cell" data-column-index="2"><p></p><div class="image-wrapper align-left" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 500px; height: 324px; overflow: visible;" data-ratio="0.6486" data-resizing="0"><font><img src="assets/1771801667681.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><span><b>选课系统</b></span><b>（优化后）</b><span><br></span></font><p class="detail-note-text"><font><span>选课系统是学生完成课程搜索、方案规划、正式注册、退课与重选的平台。</span></font></p><font><p></p></font></div></div><p></p><p class="detail-note-text"><br></p><h2>1.2 项目流程</h2><p class=""><font>项目按<span style="color: rgb(0, 0, 0);">照<span><b>“用户研究-原型设计-用户测试”的流程进行问题定义，解决方案设计和迭代，并输出最终的实施方案。</b></span></span></font></p><p class=""><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 800px; height: 221px; overflow: visible;" data-ratio="0.2768" data-resizing="0"><font><img src="assets/1771828429639.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><p></p><p class="detail-note-text" style="text-align: center;"><font>图1 项目流程</font></p><p style="text-align: left;">本文档将按照以上4阶段<span style="color: rgb(0, 0, 0);">的流程，分别讲述<b>导航页</b>和<b>选课系统</b>的设计过程。</span></p><h1><font>2 导航页改版设计</font></h1><h2><font>2.1 用户研究</font></h2><p data-start="36" data-end="160" style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(0, 0, 0);">导航页的主要服务对象是在读学生。为此，我们<span>对<b> 30 余位学生开展了用户调研，并保证了样本的多样性</b></span>——覆盖高年级学生与新生、本土学生与国际学生等不同群体。样本的多样性与相对均衡分布有助于降低调研结论的偏差，从而支持设计一个对广泛用户群体友好的产品。</span></p><p data-start="162" data-end="295" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(0, 0, 0);"><b>调研方法结合主客观两种路径，主要包括用户访谈与用户测试两个部分。</b></span></p><p data-start="162" data-end="295" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">用户访谈采用非结构化提纲，重点收集用户对现有功能与体验的评价；用户测试则通过观察用户实际使用产品的过程，并结合“为什么”的追问，深入理解用户的使用习惯、操作卡点以及用户自身未必能明确表达的问题。</p><p><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 800px; height: 464px;" data-ratio="0.5800" data-resizing="0"><font><img src="assets/1772859473189.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><font>图2 旧版导航页界面</font></p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 441px; overflow: visible;" data-ratio="1.3794" data-resizing="0"><img src="assets/1771913167885.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text"><span>图3 我所负责部分的调研结果整理</span></p><p></p><p></p><p></p><p></p><p></p><p><font>我们的调研得出了以下发现：</font></p><p></p><p></p><ol><li><span style="color: rgb(0, 0, 0);"><span style="background-color: transparent;"><b>导航页没有起到“导航”的作用，主要</b></span><b style="background-color: transparent;">充当高频应用的入口</b><span style="background-color: transparent;">。</span></span></li><ol><li><span style="background-color: transparent; color: rgb(0, 0, 0);">90%+用户只知道并使用导航页的3-5个入口。大多数人把导航页作为高频应用的入口，自动忽视其他应用。</span></li><li><span style="color: rgb(0, 0, 0);">99%+用户尝试寻找学校服务的入口的时候，更倾向于使用搜索引擎而非导航页。</span></li></ol><li><span style="color: rgb(0, 0, 0);"><span style="background-color: transparent;"><b>高频应用入口难以快速定位</b></span><span style="background-color: transparent;"><b>。</b>导航页在一个页面提供了50个入口，文字多且无明显区分。</span></span></li><li><span style="background-color: transparent; color: rgb(0, 0, 0);"><b>界面信息负担重，层级混乱。</b></span><span style="background-color: transparent;"><span style="color: rgb(0, 0, 0);">80%</span>+用户对导航页的界面设计感到不满，集中在</span><span style="background-color: transparent;">信息量过多，主次要素区分不明显，板块分类条件不明，背景杂乱</span><span style="background-color: transparent;">。</span></li></ol><p></p><p></p><h2><font>2.2 原型设计与测试迭代</font></h2><h3>改进方向（How might we）</h3><p><font>根据用户调研的结论，我们确定了改进的方向：</font></p><p></p><p></p><ol><li><font style="background-color: transparent; color: rgb(47, 85, 151);"><b>“我们如何帮助用户更高效的进入高频应用？”</b>：</font><span style="background-color: transparent;">超过 <b><span style="color: rgb(47, 85, 151);">90%</span> </b>的使用场景是从导航页进入高频应用</span></li><li><span style="background-color: transparent;"><b style="color: rgb(47, 85, 151);">“我们如何让信息层级的呈现更加清晰？”</b><span style="color: rgb(47, 85, 151);">：<b>80%+</b></span>用户认为导航页信息组织混乱</span></li><li><span style="background-color: transparent;"><span style="color: rgb(47, 85, 151);"><b>“我们如何帮助用户快速找到所需的服务？”</b>：<b>99%</b></span>用户不知道可通过导航页搜索进入学校的一系列学生服务</span></li></ol><p></p><p></p><p><span>我们采用<span style="color: rgb(0, 0, 0);">“</span></span><b style="color: rgb(0, 0, 0);">自下而上</b><span><span style="color: rgb(0, 0, 0);">”的设计过程：先头脑</span>风暴提出大量idea，再淘汰和整合，形成一个功能原型，输出4-5个功能后，再将它们整合起来，考虑界面架构和操作逻辑，形成几套解决方案，每套解决方案对应不同的侧重点，再基于用户反馈决定迭代方向。</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 566px;" data-ratio="0.8845" data-resizing="0"><img src="assets/1776309925152.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p></p><p style="text-align: center;" class="detail-note-text">图4 方案设计过程</p><h3>功能设计</h3><p><font><span style="color: rgb(47, 85, 151);"><b>高频应用进入：收藏夹</b></span></font></p><p>90%用户把导航页作为3-5个高频功能的入口，但高频功能视用户的需求而异。通过收藏夹，允许用户自定义自己的功能入口界面，形成自己熟悉的操作路径，提升用户从导航页进入高频应用的流畅度。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 120px;" data-ratio="0.3735" data-resizing="0"><img src="assets/1772859473206.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;"></p><p><font></font></p><p style="text-align: center;" class="detail-note-text"><span style="background-color: transparent;">图5&nbsp;</span><span>收藏夹设计</span></p><p><span style="color: rgb(47, 85, 151);"><b>应用布局：分类折叠</b></span></p><p>通过归类折叠的方式整理，默认展开最高频的“我的课程”类别，避免旧版全部展开的视觉干扰。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 560px; height: 121px;" data-ratio="0.2162" data-resizing="0"><img src="assets/1772859473209.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;"><span style="color: rgb(111, 106, 100); background-color: transparent;">图6&nbsp;</span><span style="color: rgb(111, 106, 100);">分类折叠设计</span></p><p><br></p><p><b style="color: rgb(47, 85, 151);">强化搜索功能：增加搜索框</b></p><p>搜索是用户高效查找应用入口的方式。旧版的搜索按钮不明显，很多用户并不知道导航页有搜索功能。新版设计强化搜索框，突出导航搜索功能。搜索框下列出历史记录，用户可快速进入自己的历史搜索入口。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 480px; height: 149px;" data-ratio="0.3103" data-resizing="0"><img src="assets/1772859473212.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;"><span style="background-color: transparent; color: rgb(111, 106, 100);">图7&nbsp;</span><span style="color: rgb(111, 106, 100);">搜索设计</span></p><p><b style="color: rgb(47, 85, 151);">新增推荐功能</b></p><p class=""><font></font></p><p><font><span>在调研中，我们发现<b>很多学校</b><span style="color: rgb(0, 0, 0);"><b>的</b><span><b>优质服务和资源难以触及学生</b>。</span>如在入学季，学生可以通过workday平台申请学校工作减轻经济压力；在求职季，学生可以在就业指导平台预约简历修改，面试模拟等服务。</span></span></font><span style="background-color: transparent; color: rgb(0, 0, 0);">这些服务现有的推广方式是通过邮件和入学的介绍科普，痛点是学生未必能记下所有的服务，并在需要的时候想起来。另一方面通过邮件搜索非常麻烦且找不到。通过推荐栏的方式，如在入学季推荐校内工作平台，在求职季推荐就业指导平台，可以提高这些学生服务的触及，提高就读体验。<b>用户<span>通过“浏览推荐+收藏”的操作，可以个性化归纳对自己有用的服务</span>。</b></span></p><p><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 240px; height: 169px;" data-ratio="0.7059" data-resizing="0"><font><img src="assets/1772859473215.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;"><font><span style="background-color: transparent; color: rgb(111, 106, 100);">图8 推荐功能</span><span style="color: rgb(111, 106, 100);">设计</span></font></p><h3><font>界面布局设计</font></h3><p style="text-align: left;"><font>在完成功能的设计后，我们将功能整合，形成解决方案。根据侧重点的不同，我们提出了三个方向的解决方案用于用户测试：</font></p><div class="detail-columns-block" data-columns-count="3" data-columns-color="#f5f5f7" style="--columns-count: 3; --columns-bg: #f5f5f7;"><div class="detail-columns-cell" data-column-index="1"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 209px; overflow: visible;" data-ratio="0.6530" data-resizing="0"><font><img src="assets/1771913167894.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><div style="text-align: center;"><b style="color: rgb(0, 0, 0);">方向1—全能模式：搜索+个性化+推荐+低频折叠</b></div><p></p></font></div><div class="detail-columns-cell" data-column-index="2"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 209px; overflow: visible;" data-ratio="0.6535" data-resizing="0"><font><img src="assets/1771913167897.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><div style="text-align: center;"><b>方向2—极简模式：突出搜索+个性化，弱化其他</b></div><p></p></font></div><div class="detail-columns-cell" data-column-index="3"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 208px; overflow: visible;" data-ratio="0.6486" data-resizing="0"><font><img src="assets/1771913167900.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><div style="text-align: center;"><b>方向3—旧版微调：搜索框上移，突出应用入口</b></div><p></p></font></div></div><p><font style="color: rgb(0, 0, 0);"><b>方向1集合所有功能</b>，并通过页面布局设计区分，最大程度满足用户需求和业务目标。</font></p><p><font style="color: rgb(0, 0, 0);"><b>方向2以简洁和简化为导向</b>，重点突出搜索和个性化收藏的核心功能。</font></p><p><font><span style="color: rgb(0, 0, 0);"><b>方向3延续旧版设计</b>，</span>弱化搜索，强调门户分流的入口模式。</font></p><h3><font>测试反馈</font></h3><p><font>用户和学校均选<span style="color: rgb(0, 0, 0);">择<b>方向1</b>作为最喜爱的方向</span></font></p><p></p><ol><li><span style="color: rgb(0, 0, 0);">用户认为导航页是一个<b>“工具”</b>类型的平台，希望更多的工具完成他们的目的。</span></li><li><span style="color: rgb(0, 0, 0);">用户认为搜索和推荐功能更好的满足他们对导航页的期待，使他们更方便查找和了解应用入口</span></li><li><span style="color: rgb(0, 0, 0);">搜索和推荐功能符合学校希望推广学生服务的目的</span></li></ol><p></p><p><span style="color: rgb(0, 0, 0);"><font></font></span></p><hr id="null"><p><font style="color: rgb(0, 0, 0);">当然，也有用户提出了<b>反面</b>的建议：</font></p><p><span><span style="color: rgb(0, 0, 0);">一位用户称尽管新的界面看上去更加清</span>晰了，但他已经习惯了现在这个页面，更新页面也未必提高效率。</span><span style="background-color: transparent;">另一位用户则质疑个性化定制的必要性：“或许没有人会花时间去定制这个界面“</span><span><br></span></p><p></p><blockquote><span><span>设计团队的解释：高年级学生往往已经对原有系统形成固定使用路径，并发展出自己的“捷径”</span><span>。但学校学生群体流动性高（本科4年，硕士1-2年），改版有长期效益。同时，</span></span><span><span data-start="402" data-end="426">新生对导航页表现出强大的好奇心与探索行为</span>，新用户对花时间进行定制并不抵触，个性化配置还能在早期阶段逐步建立使用习惯。同时，大多数中高年级同学也表示愿意尝试个性化功能。</span></blockquote><p></p><p></p><p><font>结合用户测试结果，<span style="color: rgb(0, 0, 0);">我们<span><b>最终选择了方向1作为深化方向，并坚持了大多数用户认可的搜索+个性化+推荐的核心功能。</b></span></span></font></p><p class="detail-note-text"><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 600px; height: 392px; overflow: visible;" data-ratio="0.6530" data-resizing="0"><font><img src="assets/1771913167904.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><p style="text-align: center;" class="detail-note-text">图9 被选中的方向1的低保真原型</p></font><p></p><h2><font>2.3 实施方案</font></h2><p><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 412px;" data-ratio="0.6438" data-resizing="0"><font><img src="assets/1772859473218.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><font><span>图10 实施方案</span></font></p><p><font>相比低保真原型，实施方案主要做出了以下修改：</font></p><p></p><ol><li>与学校官网采用一致的<span style="color: rgb(0, 0, 0);">颜色和字体方案，包括使用深色的标题栏<b>平衡视觉体验</b>。</span></li><li><span style="color: rgb(0, 0, 0);">推荐功能<b>增加刷新按钮</b>，用户可以点击查看更多推荐。</span></li></ol><div><span style="color: rgb(0, 0, 0);">同时，实施方案还深化了用户<b>自定义收藏</b>栏</span>部分的操作，包括允许用户修改名称，增加颜色标记分类，增加外部链接入口等。个性化的导航栏成为用户进入学校相关服务的集中入口。</div><div><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 255px;" data-ratio="0.7974" data-resizing="0"><img src="assets/1772859473222.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div></div><div></div><p></p><p style="text-align: center; " class="detail-note-text"><font><span>图11 增加链接到收藏栏功能</span></font></p><p style="text-align: center; " class="detail-note-text"><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 212px;" data-ratio="0.6638" data-resizing="0"><font><img src="assets/1772859473225.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><font><span>图12 编辑收藏夹功能“新增/删除/改名/改颜色标签”</span></font></p><h2><font>2.4 效果评估</font></h2><p><font></font></p><div class="detail-columns-block" data-columns-count="2" data-columns-color="#f5f5f7" style="--columns-count: 2; --columns-bg: #f5f5f7;"><div class="detail-columns-cell" data-column-index="1"><p><font><b>旧版</b><br></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 500px; height: 290px;" data-ratio="0.5800" data-resizing="0"><font><font><img src="assets/1772859473189.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></font></div><p></p></div><div class="detail-columns-cell" data-column-index="2"><p><font><b>新版</b><br></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 500px; height: 322px;" data-ratio="0.6438" data-resizing="0"><font><img src="assets/1772859473218.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p></div></div><p><font>效果评估包括可用性测试，用户满意度评分。新版界面用<span style="color: rgb(0, 0, 0);">户<b>满意度大幅提升</b>，主要</span>来自“界面更加清晰了”，“操作更加便捷”，“收藏夹和历史记录很好用”，“搜索符有帮助”。可用性测试表明：收藏夹编辑功能仍有提升空间，如何提高其易用性将是迭代优化的主要方向。</font></p><p></p><p><br></p><h1><font>3 选课系统改版（WIP）</font></h1><p><span style="background-color: rgb(255, 221, 0);">内容制作中～</span></p><h2>3.1 用户研究</h2><p><br></p><h2>3.2 原型设计与测试迭代</h2><p><br></p><h2>3.3 实施方案</h2><p><br></p><p></p><h2>3.4 效果评估</h2><p><br></p><p><font><br></font></p><p><font><br></font></p></template>
  <template id="detail-content-en-template"><div><p data-start="0" data-end="579" class="detail-note-text"><span><font>Project Overview: The Penn student landing page and course registration system are among the most frequently used digital services on campus. Common feedback includes issues such as “difficulty locating entry points,” “unclear course registration procedures,” and “uncertainty about whether enrollment was successful.” In a survey, more than <b>60%</b> of students reported dissatisfaction with the navigation page experience, while dissatisfaction with the course registration process was even higher, reaching <b>85%.</b></font></span></p><p data-start="581" data-end="986" class="detail-note-text"><font>Based on user research, the project team identified key pain points such as <b>disorganized information presentation and unclear operational logic </b>in the course registration process. In response, the team redesigned the navigation page’s information architecture and restructured the interaction logic of the course registration system, followed by multiple rounds of user testing and iterative optimization.</font></p><p data-start="988" data-end="1246" data-is-last-node="" data-is-only-node="" class="detail-note-text"><font>Compared with the previous version, user satisfaction with the new navigation page increased significantly, and the success rate of course registration tasks improved by 66%, demonstrating that the redesign substantially enhanced the overall user experience.</font></p></div><p data-start="44" data-end="181" class="detail-note-text"><font size="3"><span><br></span></font></p><h1><span>1 Project Introduction</span></h1><h2><span>1.1 Design Object</span></h2><p><span><br></span></p><div class="detail-columns-block" data-columns-count="2" data-columns-color="#ffffff" style="--columns-count: 2; --columns-bg: #ffffff;"><div class="detail-columns-cell" data-column-index="1"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 500px; height: 327px; overflow: visible;" data-ratio="0.6533" data-resizing="0"><font><img src="assets/1771801667666.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><b>Landing Page (Redesign version)</b><br><p class="detail-note-text"><span>Serves as the university’s portal website, listing entry points to various campus services. These include the course registration system, updating personal profiles, applying for financial aid, and accessing academic resources.</span></p><p></p></font></div><div class="detail-columns-cell" data-column-index="2"><p></p><div class="image-wrapper align-left" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 500px; height: 324px; overflow: visible;" data-ratio="0.6486" data-resizing="0"><font><img src="assets/1771801667681.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><span><b>Course registration system (Redesign version)</b><br></span></font><p class="detail-note-text">The<span class="Apple-converted-space">&nbsp;</span><span data-start="4" data-end="34">course registration system</span><span class="Apple-converted-space">&nbsp;</span>is the platform where students search for courses, plan their schedules, complete official enrollment, and manage add/drop or course changes.</p><font><p></p></font></div></div><p></p><p class="detail-note-text"><br></p><h2>1.2 Project Workflow</h2><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span>The project followed a workflow of<span class="Apple-converted-space">&nbsp;"</span></span><strong data-start="35" data-end="86">user research - prototype design - user testing"</strong><span><span class="Apple-converted-space">&nbsp;</span>to define problems, design solutions, and iteratively refine them, ultimately producing a final implementation plan.</span></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 800px; height: 237px;" data-ratio="0.2959" data-resizing="0"><img src="assets/1773196082842.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p class=""><font></font></p><p></p><p class="detail-note-text" style="text-align: center;"><font>Pic 1. Project Workflow</font></p><p style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">This document will describe the design process for the landing page and the course registration system separately, following the four-phase workflow outlined above.</p><h1><font>2 Landing Page Redesign</font></h1><h2><font>2.1 User Research</font></h2><p data-start="0" data-end="449" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The primary users of the navigation page are currently enrolled students. To better understand their needs, we conducted user research with more than 30 students and ensured sample diversity, including upperclassmen and freshmen, as well as domestic and international students. This diversity and relatively balanced distribution helped reduce potential bias in the findings and supported the design of a product that serves a broad user population.</p><p data-start="451" data-end="577" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The research combined both subjective and objective approaches, mainly consisting of<span class="Apple-converted-space">&nbsp;</span><strong data-start="536" data-end="555">user interviews</strong><span class="Apple-converted-space">&nbsp;</span>and<span class="Apple-converted-space">&nbsp;</span><strong data-start="560" data-end="576">user testing</strong>.</p><p data-start="579" data-end="1019" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">User interviews were conducted using a semi-structured guide to collect participants’ evaluations of the existing features and user experience. User testing, on the other hand, involved observing how participants actually interacted with the product and asking follow-up “why” questions to better understand their usage patterns, operational difficulties, and underlying issues that users themselves might not be able to clearly articulate.</p><p><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 800px; height: 464px;" data-ratio="0.5800" data-resizing="0"><font><img src="assets/1772859473189.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><font>Pic 2. Landing Page UI (Existing version)</font></p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 441px; overflow: visible;" data-ratio="1.3794" data-resizing="0"><img src="assets/1771913167885.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text">Pic 3.Compilation of Research Findings for the Section I Was Responsible For</p><p></p><p></p><p></p><p></p><p></p><p data-start="0" data-end="51" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Our research identified the following key findings:</p><ul data-start="53" data-end="1036" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><li data-section-id="11d921u" data-start="53" data-end="205"><p data-start="55" data-end="205"><strong data-start="55" data-end="203">The navigation page does not effectively function as a “navigation” tool and primarily serves as an entry point for high-frequency applications.</strong></p></li><li data-section-id="19h3qld" data-start="206" data-end="397"><p data-start="208" data-end="397"><strong data-start="208" data-end="283">Over 90% of users only know and use 3–5 entries on the navigation page.</strong><span class="Apple-converted-space">&nbsp;</span>Most students treat the page as a shortcut to a few frequently used services and automatically ignore the rest.</p></li><li data-section-id="1fm2aep" data-start="398" data-end="549"><p data-start="400" data-end="549"><strong data-start="400" data-end="547">More than 99% of users prefer using search engines rather than the navigation page when trying to find the entry point to a university service.</strong></p></li><li data-section-id="16z44ac" data-start="550" data-end="732"><p data-start="552" data-end="732"><strong data-start="552" data-end="612">High-frequency services are difficult to locate quickly.</strong><span class="Apple-converted-space">&nbsp;</span>The navigation page presents around 50 entries on a single screen, with dense text and little visual differentiation.</p></li><li data-section-id="16vs24h" data-start="733" data-end="1036" data-is-last-node=""><p data-start="735" data-end="1036" data-is-last-node=""><strong data-start="735" data-end="810">The interface creates a heavy cognitive load and lacks clear hierarchy.</strong><span class="Apple-converted-space">&nbsp;</span>Over 80% of users expressed dissatisfaction with the page design, mainly due to excessive information, unclear distinction between primary and secondary elements, ambiguous categorization, and a visually cluttered background.</p></li></ul><p></p><p></p><h2><font>2.2 Prototype Design &amp; Iteration</font></h2><h3>Areas for Improvement（How might we）</h3><p data-start="0" data-end="97" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Based on the findings from the user research, we identified the following improvement directions:</p><ul data-start="99" data-end="625" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0);"><li data-section-id="lpunll" data-start="99" data-end="284"><p data-start="101" data-end="284"><strong data-start="101" data-end="181" style="color: rgb(47, 85, 151);">How might we help users access high-frequency applications more efficiently?</strong><br data-start="181" data-end="184"><span style="color: rgb(0, 0, 0);">Over 90% of usage scenarios involve entering frequently used services through the navigation page.</span></p></li><li data-section-id="sqb70z" data-start="286" data-end="442"><p data-start="288" data-end="442"><strong data-start="288" data-end="348" style="color: rgb(47, 85, 151);">How might we present information hierarchy more clearly?</strong><br data-start="348" data-end="351"><span style="color: rgb(0, 0, 0);">More than 80% of users believe the navigation page has a confusing information structure.</span></p></li><li data-section-id="17462ge" data-start="444" data-end="625" data-is-last-node=""><p data-start="446" data-end="625" data-is-last-node=""><strong data-start="446" data-end="510" style="color: rgb(47, 85, 151);">How might we help users quickly find the services they need?</strong><br data-start="510" data-end="513"><span style="color: rgb(0, 0, 0);">99% of users are unaware that they can access a wide range of university services through the navigation page.</span></p></li></ul><h3>Feature Design</h3><p style="caret-color: rgb(0, 0, 0);"><span style="color: rgb(47, 85, 151);"><b>High-frequency applications: Add to Favorites</b></span></p><p><span>90% of users treat the navigation page primarily as an entry point to 3–5 frequently used functions, but which functions are considered “high-frequency” varies by individual needs. By introducing a<span class="Apple-converted-space">&nbsp;</span></span><strong data-start="198" data-end="219">favorites feature</strong><span>, users can customize their own set of function shortcuts and build a personalized interface, creating familiar usage paths and improving the efficiency of accessing frequently used services from the navigation page.</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 120px;" data-ratio="0.3735" data-resizing="0"><img src="assets/1772859473206.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;"></p><p><font></font></p><p style="text-align: center;" class="detail-note-text">Pic 4. Favorite Design</p><p data-start="0" data-end="46" style="caret-color: rgb(0, 0, 0);"><strong data-start="0" data-end="46" style="color: rgb(47, 85, 151);">Application Layout: Collapsible Categories</strong></p><p data-start="48" data-end="263" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Applications are organized using collapsible categories. By default, the high-frequency<span class="Apple-converted-space">&nbsp;</span><strong data-start="136" data-end="152">“My Courses”</strong><span class="Apple-converted-space">&nbsp;</span>category is expanded, reducing the visual clutter caused by the fully expanded layout in the previous version.</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 560px; height: 121px;" data-ratio="0.2162" data-resizing="0"><img src="assets/1772859473209.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Pic 5. Collapsible Category Design</p><p><br></p><p><span style="color: rgb(47, 85, 151);"><b>Enhanced Search Functionality: Addition of a Search Bar</b></span></p><p><span>Search is an efficient way for users to locate application entry points. In the previous version, the search button was not prominent, and many users were unaware that the navigation page supported search. The redesigned version emphasizes the search bar to highlight the navigation search function. Search history is also displayed below the search bar, allowing users to quickly access previously searched services.</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 480px; height: 149px;" data-ratio="0.3103" data-resizing="0"><img src="assets/1772859473212.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text"><span>Pic 6. Search Bar Design</span></p><p><b style="color: rgb(47, 85, 151);">Added Recommendation</b></p><p class=""><font></font></p><p data-start="42" data-end="692" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Our research found that <span>many valuable university services and resources are difficult for students to discover.</span> For example, during the beginning of the academic year, students can apply for on-campus jobs through the Workday platform to help ease financial pressure; during the job search season, students can book services such as resume reviews and mock interviews through the career services platform. Currently, these services are mainly promoted through emails or orientation sessions. However, students may not remember all available services or recall them when needed. Searching through old emails is also inconvenient and often ineffective.</p><p data-start="694" data-end="1247" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">To address this issue, the redesigned navigation page introduces a<span class="Apple-converted-space">&nbsp;</span><strong data-start="761" data-end="787">recommendation section</strong>. For instance, the on-campus job platform can be recommended during the start of the semester, while the career services platform can be highlighted during recruiting season. This approach increases the visibility and accessibility of student services, improving the overall student experience. Through the interaction of<span class="Apple-converted-space">&nbsp;</span><strong data-start="1110" data-end="1163">“browsing recommendations + adding to favorites,”</strong><span class="Apple-converted-space">&nbsp;</span>users can also gradually curate and personalize the services most relevant to them.</p><p><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 240px; height: 169px;" data-ratio="0.7059" data-resizing="0"><font><img src="assets/1772859473215.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><span>Pic 7. Recommendation Bar Design</span></p><h3></h3><h3><strong data-start="0" data-end="27">Interface Layout Design</strong></h3><p data-start="29" data-end="236" data-is-last-node="" data-is-only-node="" class=""><span style="color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);">After completing the feature design, we integrated the functionalities into comprehensive solutions. Based on different design priorities, we proposed three alternative interface directions for user testing.</span></p><div class="detail-columns-block" data-columns-count="3" data-columns-color="#f5f5f7" style="--columns-count: 3; --columns-bg: #f5f5f7;"><div class="detail-columns-cell" data-column-index="1"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 209px; overflow: visible;" data-ratio="0.6530" data-resizing="0"><font><img src="assets/1771913167894.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><div style="text-align: center;"><span style="color: rgb(0, 0, 0);"><b>Direction 1</b></span></div><p></p></font></div><div class="detail-columns-cell" data-column-index="2"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 209px; overflow: visible;" data-ratio="0.6535" data-resizing="0"><font><img src="assets/1771913167897.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><div style="text-align: center;"><b>Direction 2</b></div><p></p></font></div><div class="detail-columns-cell" data-column-index="3"><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 320px; height: 208px; overflow: visible;" data-ratio="0.6486" data-resizing="0"><font><img src="assets/1771913167900.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><div style="text-align: center;"><b>Direction 3</b></div><p></p></font></div></div><p data-start="0" data-end="157" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><strong data-start="0" data-end="16">Direction 1:</strong><span class="Apple-converted-space">&nbsp;</span>Integrates all features and differentiates them through page layout design, aiming to maximize both user needs and institutional objectives.</p><p data-start="159" data-end="283" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><strong data-start="159" data-end="175">Direction 2:</strong><span class="Apple-converted-space">&nbsp;</span>Emphasizes simplicity and minimalism, highlighting search and personalized favorites as the core functions.</p><p data-start="285" data-end="438" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><strong data-start="285" data-end="301">Direction 3:</strong><span class="Apple-converted-space">&nbsp;</span>Builds upon the previous design, downplaying search and maintaining a portal-style entry model that directs users to different services.</p><h3><font>User Test Feedback</font></h3><p data-start="0" data-end="79" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Both users and the university selected<span class="Apple-converted-space">&nbsp;</span><strong data-start="39" data-end="54">Direction 1</strong><span class="Apple-converted-space">&nbsp;</span>as the preferred option.</p><p data-start="81" data-end="444" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Users view the navigation page primarily as a<span class="Apple-converted-space">&nbsp;</span><strong data-start="127" data-end="153">tool-oriented platform</strong><span class="Apple-converted-space">&nbsp;</span>and expect it to provide more functionalities that help them accomplish their tasks efficiently. They also believe that the<span class="Apple-converted-space">&nbsp;</span><strong data-start="278" data-end="316">search and recommendation features</strong><span class="Apple-converted-space">&nbsp;</span>better align with their expectations for the navigation page, making it easier to discover and access application entry points.</p><p data-start="446" data-end="600" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">At the same time, the<span class="Apple-converted-space">&nbsp;</span><strong data-start="468" data-end="507">search and recommendation functions</strong><span class="Apple-converted-space">&nbsp;</span>support the university’s goal of promoting student services and increasing their visibility.</p><p></p><p><span style="color: rgb(0, 0, 0);"><font></font></span></p><hr id="null"><p data-start="0" data-end="48" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Of course, some users also raised <span>counterpoints</span>.</p><p data-start="50" data-end="366" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">One user noted that although the new interface appears clearer, they are already accustomed to the current page and questioned whether a redesign would actually improve efficiency. Another user questioned the necessity of personalization, suggesting that “perhaps no one would spend time customizing this interface.”</p><p></p><blockquote><p data-start="0" data-end="434" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Upper-year students often develop fixed usage patterns and personal “shortcuts” within the existing system. As a result, they may feel less need for interface changes. However, the university has a highly dynamic student population (typically four years for undergraduates and one to two years for master’s students), meaning that system improvements can generate long-term benefits for incoming cohorts.</p><p data-start="436" data-end="842" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">At the same time, new students tend to show strong curiosity and exploratory behavior toward the navigation page. New users are generally not resistant to spending time customizing their interface, and personalized configuration can help establish effective usage habits early on. In addition, most mid- and upper-year students also indicated that they would be willing to try the personalization features.</p></blockquote><p></p><p></p><p><span style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Based on the user testing results, we ultimately selected<span class="Apple-converted-space">&nbsp;</span></span><strong data-start="58" data-end="73" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Direction 1</strong><span style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><span class="Apple-converted-space">&nbsp;</span>for further development and retained the core features widely supported by users:<span class="Apple-converted-space">&nbsp;</span></span><strong data-start="156" data-end="204" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">search, personalization, and recommendations</strong><span style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">.</span></p><p class="detail-note-text"><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="width: 600px; height: 392px; overflow: visible;" data-ratio="0.6530" data-resizing="0"><font><img src="assets/1771913167904.png" draggable="false" alt="" style="width: 100%; height: 100%; object-fit: contain; position: relative; left: 0px; top: 0px;"></font></div><font><p style="text-align: center;" class="detail-note-text"><span style="text-align: start;">Pic 9. Low-Fidelity Prototype of the Selected Direction 1</span></p></font><p></p><h2><font>2.3 Final Design</font></h2><p><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 412px;" data-ratio="0.6438" data-resizing="0"><font><img src="assets/1772859473218.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><font><span>Pic 10. Final Version</span></font></p><p data-start="0" data-end="107" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Compared with the low-fidelity prototype, the implementation plan includes the following key modifications:</p><ul data-start="109" data-end="841" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);"><li data-section-id="1q17be8" data-start="109" data-end="339"><p data-start="111" data-end="339"><strong data-start="111" data-end="162">Visual consistency with the university website:</strong><span class="Apple-converted-space">&nbsp;</span>The design adopts the same color and typography scheme as the official university website, including the use of a dark header bar to create a more balanced visual experience.</p></li><li data-section-id="dr25k7" data-start="340" data-end="505"><p data-start="342" data-end="505"><strong data-start="342" data-end="378">Enhanced recommendation feature:</strong><span class="Apple-converted-space">&nbsp;</span>A refresh button is added to the recommendation section, allowing users to load and explore additional recommended services.</p></li><li data-section-id="usna1w" data-start="506" data-end="841" data-is-last-node=""><p data-start="508" data-end="841" data-is-last-node=""><strong data-start="508" data-end="559">Expanded customization for the favorites panel:</strong><span class="Apple-converted-space">&nbsp;</span>The implementation further develops the user-customizable favorites section. Users can rename items, add color tags for categorization, and include external links. The personalized navigation panel thus becomes a centralized gateway for users to access university-related services.</p></li></ul><div><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 255px;" data-ratio="0.7974" data-resizing="0"><img src="assets/1772859473222.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div></div><div></div><p></p><p style="text-align: center; " class="detail-note-text"><span>Pic 11. Add links to My Favorite</span></p><p style="text-align: center; " class="detail-note-text"><font></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 320px; height: 212px;" data-ratio="0.6638" data-resizing="0"><font><img src="assets/1772859473225.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p><p style="text-align: center;" class="detail-note-text"><span>Pic 12. Edit My Favorite</span></p><h2><font>2.4 Evaluation</font></h2><p><font></font></p><div class="detail-columns-block" data-columns-count="2" data-columns-color="#f5f5f7" style="--columns-count: 2; --columns-bg: #f5f5f7;"><div class="detail-columns-cell" data-column-index="1"><p><font><b>Old version</b></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 500px; height: 290px;" data-ratio="0.5800" data-resizing="0"><font><font><img src="assets/1772859473189.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></font></div><p></p></div><div class="detail-columns-cell" data-column-index="2"><p><font><b>Redesign version</b></font></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 500px; height: 322px;" data-ratio="0.6438" data-resizing="0"><font><img src="assets/1772859473218.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></font></div><p></p></div></div><p data-start="0" data-end="349" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">The evaluation included<span class="Apple-converted-space">&nbsp;</span><strong data-start="24" data-end="45">usability testing</strong><span class="Apple-converted-space">&nbsp;</span>and<span class="Apple-converted-space">&nbsp;</span><strong data-start="50" data-end="79">user satisfaction surveys</strong>. Overall, user satisfaction with the new interface increased significantly. Positive feedback mainly highlighted that<span class="Apple-converted-space">&nbsp;</span><strong data-start="198" data-end="349">“the interface is clearer,” “operations are more convenient,” “favorites and search history are very useful,” and “the search function is helpful.”</strong></p><p data-start="351" data-end="577" data-is-last-node="" data-is-only-node="" style="caret-color: rgb(0, 0, 0); color: rgb(0, 0, 0);">Usability testing also revealed areas for improvement. In particular, the<span class="Apple-converted-space">&nbsp;</span><strong data-start="425" data-end="454">favorites editing feature</strong><span class="Apple-converted-space">&nbsp;</span>still has room for enhancement. Improving its usability will be a key focus in future iterations and optimization efforts.</p><p></p><p><br></p><h1><font>3 Course registration Redesign（WIP）</font></h1><p><font><br></font></p><p><font><br></font></p></template>
