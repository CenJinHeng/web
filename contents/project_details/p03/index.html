  <template id="detail-content-zh-template"><div><br></div><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 120px; height: 80px;" data-ratio="0.5333" data-resizing="0"><img src="assets/1772860991148.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: left;"><span>项目心得：项目开始构想了“通过工具切入，打造社区生态”的成长路线——通过提供方便，有趣的宠物记录工具，打造和运营一个潮流温馨的宠物社区。在用户调研过程中有几个有趣的发现：（1）养宠的用户对知识社区有很大需求：如何教会宠物定点排便，如何买合适的口粮/零食/玩具（宠物版的“大众点评”），哪里是宠物友好的场所等；（2）宠物主人有一定的社交需求：给自己的宠物做社会化的训练，认识一些共同养宠的朋友互相分享（有爱心、消费力强的相似背景，共同的话题，更有可能交上朋友）</span></p><p class="detail-note-text" style="text-align: left;"><span>后来了解到宠物方向虽然是近几年的新兴市场，但几乎所有初创项目都难以完成商业化的逻辑闭环，运营难，投入大，难回本等几乎成为所有项目面临的困境，且宠物这个点比较单薄，难以单独形成一个丰富强大的社区。加之我当时课业非常紧张，所以项目甚至没有确定下要做什么，切入什么场景，因此仅能以最普通的宠物记录工具+分享社区作为核心功能，并完成UI/UX方面的设计。</span></p><p class="detail-note-text" style="text-align: left;"><br></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 453px;" data-ratio="0.7074" data-resizing="0"><img src="assets/1772860991158.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">设计成果展示</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 517px;" data-ratio="0.8079" data-resizing="0"><img src="assets/1772860991164.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">App架构设计，整体分为记录模块和社区模块两个部分</p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 434px;" data-ratio="0.6775" data-resizing="0"><img src="assets/1773117496188.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p style="text-align: center;" class="detail-note-text">低保真原型：首页/新建记录/我的档案</p><p></p><div class="image-wrapper align-left" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 1080px; height: 454px;" data-ratio="0.4200" data-resizing="0"><img src="assets/1773117496199.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; "><span style="background-color: transparent;">低保真原型：</span>记录信息的可视化展示</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 440px;" data-ratio="0.6875" data-resizing="0"><img src="assets/1773117496206.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text"><span style="background-color: transparent;">低保真原型：宠物社区</span></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 776px;" data-ratio="1.2129" data-resizing="0"><img src   <template id="detail-content-en-template"><div><br></div><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 120px; height: 80px;" data-ratio="0.5333" data-resizing="0"><img src="assets/1772860991148.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p data-start="0" data-end="25" class="detail-note-text"><strong data-start="0" data-end="23">Project Reflection:</strong></p><p data-start="27" data-end="324" class="detail-note-text">At the beginning of the project, we envisioned a growth strategy of<span class="Apple-converted-space">&nbsp;</span><strong data-start="95" data-end="160">“building a community ecosystem through utility-based tools.”</strong><span class="Apple-converted-space">&nbsp;</span>The idea was to provide a convenient and engaging pet-recording tool as the entry point, gradually developing and operating a warm, trendy pet community around it.</p><p data-start="326" data-end="387" class="detail-note-text">During user research, several interesting insights emerged:</p><p data-start="326" data-end="387" class="detail-note-text"><b>Pet owners have a strong demand for knowledge-based communities.</b> Common questions include how to train pets to use designated toilet areas, how to choose appropriate food, snacks, and toys (essentially a pet-version of “Yelp” for product recommendations), and which places are pet-friendly.</p><p data-start="326" data-end="387" class="detail-note-text"><b>Pet owners also have social needs.</b> Many hope to socialize their pets, meet other pet owners with similar interests, and share experiences.&nbsp;</p><p></p><p class="detail-note-text"></p><p class="detail-note-text"></p><p data-start="1016" data-end="1476" class="detail-note-text">However, further research revealed that although the pet industry has been a rapidly growing market in recent years,<span class="Apple-converted-space">&nbsp;</span><strong data-start="1133" data-end="1221">most pet-related startups struggle to establish a sustainable commercialization loop</strong>. High operational costs, heavy investment requirements, and difficulty achieving profitability are common challenges. Moreover, the “pet” theme alone can be relatively narrow, making it difficult to support a rich and self-sustaining community ecosystem.</p><p data-start="1478" data-end="1824" data-is-last-node="" data-is-only-node="" class="detail-note-text">In addition, my academic workload at the time was quite heavy, which meant the project never fully defined a clear product direction or specific entry scenario. As a result, the project ultimately focused on a<span class="Apple-converted-space">&nbsp;</span><strong data-start="1688" data-end="1757">basic pet-recording tool combined with a simple sharing community</strong>, primarily completing the<span class="Apple-converted-space">&nbsp;</span><strong data-start="1784" data-end="1800">UI/UX design</strong><span class="Apple-converted-space">&nbsp;</span>aspects of the concept.</p><p class="detail-note-text" style="text-align: left;"><br></p><p><span style="background-color: transparent; color: rgb(0, 0, 0); caret-color: rgb(0, 0, 0);"></span></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 453px;" data-ratio="0.7074" data-resizing="0"><img src="assets/1772860991158.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; "><br></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="true" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 517px;"
