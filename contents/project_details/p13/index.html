  <template id="detail-content-zh-template"><p class="detail-note-text">设计简介：设计立足于对城市空间和人群使用需求之上，从城市性、社会性、平民视角出发，采用消解巨构、散布触媒的方法设计主要功能体块。借助艺术内街、广场等公共空间激发场地活力。通过一条三楼到一楼的坡道，创造丰富的室内观展空间和中庭，实现流线观览的丰富视觉体验。</p><p class="detail-note-text"></p><p></p><p></p><p></p><p class="detail-note-text" style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 345px;" data-ratio="0.5393" data-resizing="0"><img src="assets/1773289634031.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>概念说明</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 375px;" data-ratio="0.5861" data-resizing="0"><img src="assets/1773289469186.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="true" style="overflow: hidden; width: 640px; height: 365px;" data-ratio="0.5703" data-resizing="0"><img src="assets/1773289469194.png" alt="" draggable="false" style="object-fit: contain; width: 640px; height: 368px; position: absolute; left: 0px; top: 0px; max-width: none;"></div><p></p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 290px;" data-ratio="0.4539" data-resizing="0"><img src="assets/1773289469203.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>设计成果展示</h2><p style="text-align: cent   <template id="detail-content-en-template"><p class="detail-note-text">Design Concept: Grounded in the spatial requirements of the city and the needs of its inhabitants, the design adopts an urban, social, and populist perspective. It deconstructs monumental structures and disperses catalytic elements to shape primary functional volumes. Public spaces such as the art-themed inner street and plaza invigorate the site. A ramp connecting the third floor to the ground level creates diverse indoor exhibition spaces and atriums, delivering a rich visual experience through a fluid visitor flow.</p><p class="detail-note-text"></p><p></p><p></p><p></p><p class="detail-note-text" style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 345px;" data-ratio="0.5393" data-resizing="0"><img src="assets/1773289634031.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><h2>Concept</h2><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 375px;" data-ratio="0.5861" data-resizing="0"><img src="assets/1773289469186.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="true" style="overflow: hidden; width: 640px; height: 365px;" data-ratio="0.5703" data-resizing="0"><img src="assets/1773289469194.png" alt="" draggable="false" style="object-fit: contain; width: 640px; height: 368px; position: absolute; left: 0px; top: 0px; max-width: none;"></div><p></p><p></p><div class="image-wrapper align-c
