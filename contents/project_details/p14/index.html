  <template id="detail-content-zh-template"><p class="detail-note-text">设计简介：营建比赛的主题是传统工艺。我们的作品概念来自于中国传统竹伞，通过模仿形成稳固的结构，作品的表皮借鉴了竹编灯笼的工艺。</p><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 322px;" data-ratio="0.5032" data-resizing="0"><img src="assets/1773284562068.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p></p><p></p><p></p><p></p><p style="text-align: center;" class="detail-note-text">结构和搭建过程</p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 233px;" data-ratio="0.3645" data-resizing="0"><img src="assets/1773284562078.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text">1:20模型搭建过程</p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 459px;" data-ratio="0.7169" data-resizing="0"><img src="assets/1773284562085.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p style="text-align: center;" class="detail-note-text">1:2模型完成效果</p><p></p></template>
