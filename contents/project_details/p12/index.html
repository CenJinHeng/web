  <template id="detail-content-zh-template"><p class="detail-note-text">设计简介：造型顺延环境与周边建筑，展现出流动与舒缓的美感。两侧分置公园与内院，体现公共建筑的开放与人居设计的特色。屋顶的‘裂缝’应用绿色低碳建筑技术、作为采光天窗与通风散热廊道。前广
场作为城市门面,按流线划分的铺地材质，从空中鸟瞰则呈现在海之珠的图像。</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 441px;" data-ratio="0.6123" data-resizing="0"><img src="assets/1773285858694.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">整体鸟瞰效果图与形体生成</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 599px;" data-ratio="0.9361" data-resizing="0"><img src="assets/1773285858706.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center; ">区位分析图与建筑路线组织分析</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 931px;" data-ratio="1.4544" data-resizing="0"><img src="assets/1773285858713.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 294px;" data-ratio="0.4586" data-resizing="0"><img src="assets/1773285858721.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p class="detail-note-text" style="text-align: center; ">广场望向客运站</p><p class="detail-note-text" style="text-align: center; "></p><div class="image-wrapper align   <template id="detail-content-en-template"><p class="detail-note-text">Design Concept: The form seamlessly extends from the surrounding environment and adjacent buildings, embodying a fluid and serene aesthetic. Parks and inner courtyards flank either side, embodying the openness of public architecture and the distinctive features of human-centered design. The “fissures” in the roof employ green, low-carbon building technologies, serving as skylights for daylighting and ventilation corridors for heat dissipation. The forecourt functions as the city's gateway, with paving materials arranged according to traffic flow patterns. When viewed from above, it reveals the image of a pearl of the sea.</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 720px; height: 441px;" data-ratio="0.6123" data-resizing="0"><img src="assets/1773285858694.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p class="detail-note-text" style="text-align: center;">Overall Bird's-Eye View Rendering and Form Generation</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 599px;" data-ratio="0.9361" data-resizing="0"><img src="assets/1773285858706.png" alt="" draggable="false" style="object-fit: contain; width: 100%; height: 100%; position: relative; left: 0px; top: 0px;"></div><p></p><p style="text-align: center;" class="detail-note-text">Site Analysis and Building Route Organization Analysis</p><p class="detail-note-text"></p><div class="image-wrapper align-center" contenteditable="false" draggable="false" data-lock-ratio="true" data-cropped="false" style="overflow: visible; width: 640px; height: 931px;" data-rat
